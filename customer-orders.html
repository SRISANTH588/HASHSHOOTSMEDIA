<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders - Hash Shoots</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#1a0000;color:#fff;min-height:100vh;}
    nav{background:rgba(26,0,0,0.97);border-bottom:1px solid rgba(229,57,53,0.15);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .logo{font-size:1.4rem;font-weight:900;}.logo span{color:#e53935;}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-right span{color:#a08080;font-size:0.875rem;}
    .btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:0.4rem 1rem;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.85rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;transition:all 0.2s;}
    .btn:hover{border-color:#e53935;color:#e53935;}
    .tab-bar{background:#110000;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;overflow-x:auto;scrollbar-width:none;}
    .ctab{padding:0.85rem 1.2rem;background:none;border:none;border-bottom:2px solid transparent;color:#a08080;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:0.45rem;text-decoration:none;transition:all 0.2s;}
    .ctab:hover{color:#fff;}
    .ctab.active{color:#e53935;border-bottom-color:#e53935;}
    .container{max-width:700px;margin:3rem auto;padding:0 1.5rem;}
    .page-title{font-size:1.8rem;font-weight:900;margin-bottom:0.4rem;}
    .page-title span{color:#e53935;}
    .subtitle{color:#a08080;margin-bottom:2rem;font-size:0.9rem;}
    .booking-item{background:#1c0000;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:0.75rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.75rem;}
    .booking-info h4{font-size:0.95rem;font-weight:700;margin-bottom:0.25rem;}
    .booking-info p{font-size:0.8rem;color:#a08080;}
    .status{padding:0.3rem 0.85rem;border-radius:50px;font-size:0.75rem;font-weight:700;}
    .status.pending{background:rgba(255,152,0,0.15);color:#ff9800;border:1px solid rgba(255,152,0,0.3);}
    .status.confirmed{background:rgba(76,175,80,0.15);color:#4caf50;border:1px solid rgba(76,175,80,0.3);}
    .status.completed{background:rgba(33,150,243,0.15);color:#2196f3;border:1px solid rgba(33,150,243,0.3);}
    .status.cancelled{background:rgba(244,67,54,0.15);color:#f44336;border:1px solid rgba(244,67,54,0.3);}
    .cancel-notice{background:rgba(244,67,54,0.07);border:1px solid rgba(244,67,54,0.25);border-left:3px solid #f44336;border-radius:10px;padding:0.85rem 1rem;margin-top:0.65rem;width:100%;}
    .cancel-notice-title{font-size:0.82rem;font-weight:800;color:#f44336;margin-bottom:0.3rem;display:flex;align-items:center;gap:0.4rem;}
    .cancel-notice-body{font-size:0.78rem;color:#a08080;line-height:1.65;}
    .empty{color:#a08080;font-size:0.875rem;text-align:center;padding:3rem;}
  </style>
</head>
<body>
  <nav>
    <div class="logo">HA<span>⚡</span>H SHOOTS</div>
    <div class="nav-right">
      <span id="welcomeMsg">Welcome, Customer</span>
      <a href="customer.html" class="btn"><i class="fas fa-arrow-left"></i> Back</a>
      <button class="btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>


  <div class="container">
    <h1 class="page-title">My <span>Orders</span></h1>
    <p class="subtitle">Track all your bookings and shoot status</p>
    <div id="bookingsList"><div class="empty">Loading...</div></div>
  </div>

  <script>
    if(localStorage.getItem('hs_role') !== 'customer') window.location.href = 'login.html';
    var user = localStorage.getItem('hs_customer_name') || localStorage.getItem('hs_user') || 'Customer';
    document.getElementById('welcomeMsg').textContent = 'Welcome, ' + user;

    var videoDB = null;
    function openVideoDB(cb){
      if(videoDB){ cb(videoDB); return; }
      var req = indexedDB.open('hs_staff_videos_db', 1);
      req.onupgradeneeded = function(e){ e.target.result.createObjectStore('videos',{keyPath:'id'}); };
      req.onsuccess = function(e){ videoDB = e.target.result; cb(videoDB); };
      req.onerror = function(){ cb(null); };
    }

    function loadBookings(){
      var bookings  = JSON.parse(localStorage.getItem('hs_bookings') || '[]');
      var custEmail = localStorage.getItem('hs_user') || '';
      var enquiries = JSON.parse(localStorage.getItem('hs_customer_enquiries_' + custEmail) || '[]');
      var allVideos = JSON.parse(localStorage.getItem('hs_staff_videos') || '[]');
      var assigns   = JSON.parse(localStorage.getItem('hs_assigned_shoots') || '[]');
      var payments  = JSON.parse(localStorage.getItem('hs_payments') || '[]');
      var list = document.getElementById('bookingsList');

      var bookingHTML = bookings.slice().reverse().map(function(b){
        var assign = assigns.find(function(a){ return a.bookingId == b.id; });
        var vid    = assign ? allVideos.find(function(v){ return v.assignId == assign.id; }) : null;
        var paid   = payments.find(function(p){ return p.bookingId === b.id; });

        var arrivedBadge = assign && assign.arrivedAt
          ? '<span style="background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.3);color:#4caf50;font-size:0.68rem;font-weight:700;padding:0.15rem 0.55rem;border-radius:50px;"><i class="fas fa-map-marker-alt"></i> Creator Arrived</span>'
          : '';

        var videoSection = '';
        if(vid && (b.status === 'confirmed' || b.status === 'completed')){
          videoSection = '<div id="custVid_'+vid.id+'" style="margin-top:0.75rem;padding:0.75rem;background:#110000;border-radius:10px;border:1px solid rgba(229,57,53,0.2);">'
            + '<div style="font-size:0.75rem;font-weight:700;color:#e53935;margin-bottom:0.4rem;"><i class="fas fa-film"></i> Your Edited Video is Ready!</div>'
            + '<div class="vid-loading"><i class="fas fa-spinner fa-spin"></i> Loading video...</div>'
            + '</div>';
        }

        var cancelNotice = '';
        if(b.status === 'cancelled'){
          var refundLine = paid
            ? ' A refund of <strong style="color:#fff;">₹' + (paid.amount||0).toLocaleString('en-IN') + '</strong> will be initiated to your wallet within 24–48 hours.'
            : '';
          cancelNotice = '<div class="cancel-notice">'
            + '<div class="cancel-notice-title"><i class="fas fa-times-circle"></i> Order Cancelled</div>'
            + '<div class="cancel-notice-body">We’re sorry for the inconvenience caused. Your booking has been cancelled by our team.' + refundLine + ' If you need any assistance, please feel free to <a href="customer-support.html" style="color:#e53935;font-weight:600;">contact us</a>. Thank you for your understanding. 🙏</div>'
            + '</div>';
        }

        return '<div class="booking-item" style="flex-direction:column;align-items:flex-start;">'
          + '<div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%;flex-wrap:wrap;gap:0.5rem;">'
          + '<div class="booking-info">'
          + '<h4>' + b.service + ' &mdash; ' + b.city + '</h4>'
          + '<p>' + (b.date ? b.date + (b.time ? ' at ' + b.time : '') : '') + (b.location ? ' &nbsp;|&nbsp; ' + b.location : '') + '</p>'
          + '<p>' + b.name + ' &nbsp;|&nbsp; ' + b.phone + '</p>'
          + '<p style="margin-top:4px;font-size:0.72rem;opacity:0.5">Booked on ' + b.createdAt + '</p>'
          + '</div>'
          + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;">'
          + '<span class="status ' + b.status + '">' + b.status.charAt(0).toUpperCase() + b.status.slice(1) + '</span>'
          + arrivedBadge
          + '</div></div>'
          + videoSection
          + cancelNotice
          + '</div>';
      }).join('');

      var enquiryHTML = enquiries.slice().reverse().map(function(q){
        return '<div class="booking-item">'
          + '<div class="booking-info">'
          + '<h4><i class="fas fa-envelope" style="color:#e53935;font-size:0.85rem;"></i> &nbsp;Enquiry</h4>'
          + '<p style="margin-top:4px;">' + q.message + '</p>'
          + '<p style="margin-top:4px;font-size:0.72rem;opacity:0.5">Submitted on ' + q.submittedAt + '</p>'
          + '</div>'
          + '<span class="status pending">Pending</span>'
          + '</div>';
      }).join('');

      list.innerHTML = (bookingHTML + enquiryHTML) || '<div class="empty">No orders or enquiries yet.</div>';

      // Load videos from IndexedDB
      JSON.parse(localStorage.getItem('hs_staff_videos') || '[]').forEach(function(v){
        var el = document.getElementById('custVid_' + v.id);
        if(!el) return;
        openVideoDB(function(db){
          if(!db) return;
          var req = db.transaction('videos','readonly').objectStore('videos').get(v.id);
          req.onsuccess = function(){
            if(!req.result || !req.result.blob) return;
            var url = URL.createObjectURL(req.result.blob);
            el.innerHTML = '<div style="font-size:0.75rem;font-weight:700;color:#e53935;margin-bottom:0.5rem;"><i class="fas fa-film"></i> Your Edited Video is Ready!</div>'
              + '<video src="'+url+'" controls style="width:100%;max-height:260px;border-radius:8px;"></video>'
              + '<div style="font-size:0.65rem;color:#a08080;margin-top:0.3rem;">Delivered by Hash Shoots</div>';
          };
        });
      });
    }

    loadBookings();
    setInterval(loadBookings, 4000);

    function logout(){ localStorage.removeItem('hs_role'); window.location.href = 'login.html'; }
  </script>
</body>
</html>
