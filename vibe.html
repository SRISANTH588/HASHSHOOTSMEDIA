<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Discover with Vibe – Hash Shoots</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { background: #0a0a0a; }
    .vibe-page { padding: 7rem 1.5rem 4rem; max-width: 1300px; margin: 0 auto; }
    .vibe-header { text-align: center; margin-bottom: 2rem; }
    .vibe-title { font-size: clamp(2rem, 4vw, 3rem); font-weight: 900; color: #fff; margin-bottom: 0.4rem; }
    .vibe-title span { color: #c9a84c; }
    .vibe-subtitle { color: #706050; font-size: 0.95rem; }
    .vibe-cats { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; padding: 0 1.5rem; margin-bottom: 2.5rem; }
    .vibe-cat { padding: 0.45rem 1.1rem; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #888070; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; white-space: nowrap; }
    .vibe-cat.active, .vibe-cat:hover { background: #c9a84c; color: #fff; border-color: transparent; }
    .vibe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .vibe-card { background: #0f0f0f; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
    .vibe-card:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(201,168,76,0.2); }
    .vibe-thumb { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; }
    .vibe-thumb-placeholder { width: 100%; aspect-ratio: 9/16; background: linear-gradient(135deg,#181818,#0a0a0a); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; color: #3a1a1a; }
    .vibe-thumb-placeholder i { font-size: 2.5rem; }
    .vibe-thumb-placeholder span { font-size: 0.75rem; }
    .vibe-info { padding: 0.85rem 1rem; }
    .vibe-info-title { font-size: 0.9rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vibe-info-cat { font-size: 0.72rem; color: #c9a84c; font-weight: 600; }
    .vibe-empty { text-align: center; padding: 5rem 1.5rem; color: #484030; grid-column: 1/-1; }
    .vibe-empty i { font-size: 3rem; display: block; margin-bottom: 1rem; opacity: 0.3; }
    .vibe-empty p { font-size: 0.95rem; }
    /* Lightbox */
    .vibe-lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; align-items: center; justify-content: center; }
    .vibe-lightbox.open { display: flex; }
    .vibe-lb-inner { position: relative; max-width: 400px; width: 90%; }
    .vibe-lb-video { width: 100%; border-radius: 16px; max-height: 80vh; }
    .vibe-lb-img { width: 100%; border-radius: 16px; max-height: 80vh; object-fit: contain; }
    .vibe-lb-close { position: absolute; top: -14px; right: -14px; width: 32px; height: 32px; background: #c9a84c; border: none; border-radius: 50%; color: #fff; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  </style>

  <script src="nav.js"></script>
</head>
<body>

  <!-- NAVBAR -->

  <div class="vibe-page">
    <div class="vibe-header">
      <h1 class="vibe-title">Discover with <span>Vibe</span></h1>
      <p class="vibe-subtitle">Explore trending reels from our creators</p>
    </div>

    <div class="vibe-cats">
      <button class="vibe-cat active" data-cat="all">All</button>
      <button class="vibe-cat" data-cat="Testimonials"><i class="fas fa-star"></i> Testimonials</button>
      <button class="vibe-cat" data-cat="Events & Weddings">Events &amp; Weddings</button>
      <button class="vibe-cat" data-cat="Car Delivery">Car Delivery</button>
      <button class="vibe-cat" data-cat="Celebrities">Celebrities</button>
      <button class="vibe-cat" data-cat="Outfit Shoots">Outfit Shoots</button>
      <button class="vibe-cat" data-cat="Concerts">Concerts</button>
      <button class="vibe-cat" data-cat="Collaborations">Collaborations</button>
      <button class="vibe-cat" data-cat="Decor & Interiors">Decor &amp; Interiors</button>
      <button class="vibe-cat" data-cat="Caterers">Caterers</button>
    </div>

    <div class="vibe-grid" id="vibeGrid"></div>
    <div id="testiPanel" style="display:none;"></div>
  </div>

  <!-- Lightbox -->
  <div class="vibe-lightbox" id="vibeLightbox">
    <div class="vibe-lb-inner">
      <button class="vibe-lb-close" id="vibeLbClose"><i class="fas fa-times"></i></button>
      <div id="vibeLbContent"></div>
    </div>
  </div>

  <script>
    var currentCat = 'all';
    var _vibeItems = [];

    async function loadVibeFromFirestore(){
      try {
        var fbMod   = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
        var fbStore = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
        var fbCfg = {apiKey:'AIzaSyAtkcHfgNx9xEcyMC50eRX5VPv1r7O5XyE',authDomain:'hash-shoots.firebaseapp.com',projectId:'hash-shoots',storageBucket:'hash-shoots.firebasestorage.app',messagingSenderId:'1093054616221',appId:'1:1093054616221:web:55bdebafc895acfd04fa74'};
        var app = fbMod.getApps().find(function(a){return a.name==='vibe-page';}) || fbMod.initializeApp(fbCfg,'vibe-page');
        var db  = fbStore.getFirestore(app);
        fbStore.onSnapshot(fbStore.collection(db,'vibe_items'), function(snap){
          _vibeItems = [];
          snap.forEach(function(d){ _vibeItems.push(Object.assign({id:d.id},d.data())); });
          renderVibe();
        });
      } catch(e){ console.error('Vibe load error:',e); }
    }

    function renderVibe(){
      var filtered = currentCat === 'all' ? _vibeItems : _vibeItems.filter(function(i){ return i.category === currentCat; });
      var grid = document.getElementById('vibeGrid');
      if(!filtered.length){
        grid.innerHTML = '<div class="vibe-empty"><i class="fas fa-photo-video"></i><p>No content yet. Check back soon!</p></div>';
        return;
      }
      grid.innerHTML = filtered.map(function(item, idx){
        var thumb = item.thumbnail
          ? '<img class="vibe-thumb" src="'+item.thumbnail+'" alt="'+item.title+'" loading="lazy"/>'
          : '<div class="vibe-thumb-placeholder"><i class="fas fa-play-circle"></i><span>'+item.category+'</span></div>';
        return '<div class="vibe-card" onclick="openLb('+idx+')">'+thumb+'<div class="vibe-info"><div class="vibe-info-title">'+item.title+'</div><div class="vibe-info-cat"><i class="fas fa-play-circle" style="margin-right:4px;"></i>'+item.category+'</div></div></div>';
      }).join('');
    }

    document.querySelectorAll('.vibe-cat').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.querySelectorAll('.vibe-cat').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        if(currentCat === 'Testimonials'){
          document.getElementById('vibeGrid').style.display = 'none';
          var panel = document.getElementById('testiPanel');
          panel.style.display = 'block';
          renderTestimonials(panel);
        } else {
          document.getElementById('vibeGrid').style.display = 'grid';
          document.getElementById('testiPanel').style.display = 'none';
          renderVibe();
        }
      });
    });

    function renderTestimonials(panel){
      var meta = JSON.parse(localStorage.getItem('hs_testi_videos')||'[]').slice().reverse();
      if(!meta.length){
        panel.innerHTML = '<div class="vibe-empty"><i class="fas fa-play-circle"></i><p>No testimonial videos yet. Check back soon!</p></div>';
        return;
      }
      panel.innerHTML = '<div class="vibe-grid" id="testiInner"></div>';
      var inner = document.getElementById('testiInner');
      var _db = null;
      function openTDB(cb){
        if(_db){ cb(_db); return; }
        var r = indexedDB.open('hs_testi_videos_db',1);
        r.onupgradeneeded = function(e){ e.target.result.createObjectStore('videos',{keyPath:'id'}); };
        r.onsuccess = function(e){ _db=e.target.result; cb(_db); };
        r.onerror = function(){ cb(null); };
      }
      meta.forEach(function(v){
        var card = document.createElement('div');
        card.className = 'vibe-card';
        var videoUrl = v.cloudUrl || v.url || '';
        if(videoUrl){
          card.innerHTML =
            '<video src="'+videoUrl+'" controls preload="metadata" style="width:100%;aspect-ratio:9/16;object-fit:cover;display:block;background:#000;"></video>'
            +'<div class="vibe-info"><div class="vibe-info-title">'+v.clientName+'</div>'+(v.caption?'<div class="vibe-info-cat">'+v.caption+'</div>':'')+'</div>';
        } else {
          card.innerHTML =
            '<div style="width:100%;aspect-ratio:9/16;background:#0a0a0a;display:flex;align-items:center;justify-content:center;color:#c9a84c;font-size:2.5rem;"><i class="fas fa-play-circle"></i></div>'
            +'<div class="vibe-info"><div class="vibe-info-title">'+v.clientName+'</div>'+(v.caption?'<div class="vibe-info-cat">'+v.caption+'</div>':'')+'</div>';
        }
        inner.appendChild(card);
      });
    }

    function openLb(idx){
      var filtered = currentCat === 'all' ? _vibeItems : _vibeItems.filter(function(i){ return i.category === currentCat; });
      var item = filtered[idx];
      var lb = document.getElementById('vibeLightbox');
      var lbContent = document.getElementById('vibeLbContent');
      lb.classList.add('open');
      var videoUrl = item.url || item.cloudUrl || '';
      if(videoUrl){
        lbContent.innerHTML = '<video class="vibe-lb-video" src="'+videoUrl+'" controls autoplay playsinline></video>';
      } else if(item.thumbnail){
        lbContent.innerHTML = '<img class="vibe-lb-img" src="'+item.thumbnail+'" alt="'+item.title+'"/>';
      } else {
        lbContent.innerHTML = '<div style="color:#fff;text-align:center;padding:2rem;"><i class="fas fa-exclamation-circle" style="font-size:2.5rem;color:#c9a84c;"></i><p style="margin-top:1rem;">Video not available.</p></div>';
      }
    }

    function closeLb(){
      var v = document.querySelector('#vibeLbContent video');
      if(v){ URL.revokeObjectURL(v.src); v.pause(); }
      document.getElementById('vibeLightbox').classList.remove('open');
      document.getElementById('vibeLbContent').innerHTML = '';
    }

    document.getElementById('vibeLbClose').addEventListener('click', closeLb);
    document.getElementById('vibeLightbox').addEventListener('click', function(e){ if(e.target===this) closeLb(); });

    loadVibeFromFirestore();
  </script>



</body>
</html>
