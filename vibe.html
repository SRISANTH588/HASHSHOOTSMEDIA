<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Discover with Vibe – OG Shoots</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#080808;font-family:'Inter',sans-serif;color:#fff;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.12) 0%,#080808 55%,#050505 100%);z-index:-1;}

    /* PAGE */
    .vp{padding:6rem 0 4rem;}

    /* HEADER */
    .vh{text-align:center;margin-bottom:2.5rem;padding:0 1rem;}
    .vt{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;color:#fff;margin-bottom:0.5rem;letter-spacing:-1px;line-height:1.1;}
    .vt span{color:#c9a84c;}
    .vs{color:#888;font-size:1rem;font-weight:400;}

    /* PILLS */
    .vcp{overflow-x:auto;scrollbar-width:none;padding:0 3.5rem;margin-bottom:1.8rem;}
    .vcp::-webkit-scrollbar{display:none;}
    .vcr{display:flex;gap:0.55rem;width:max-content;}
    .vc{
      padding:0.5rem 1.3rem;
      border-radius:50px;
      border:1.5px solid rgba(255,255,255,0.18);
      background:transparent;
      color:#bbb;
      font-size:0.83rem;
      font-weight:600;
      cursor:pointer;
      font-family:inherit;
      transition:all 0.2s;
      white-space:nowrap;
    }
    .vc.active{background:#c9a84c;color:#000;border-color:#c9a84c;}
    .vc:hover:not(.active){border-color:rgba(255,255,255,0.4);color:#fff;}

    /* SLIDER SECTION */
    .vsec{position:relative;display:flex;align-items:center;padding:0 1rem;}

    /* ARROWS */
    .varr{
      flex-shrink:0;
      width:40px;height:40px;
      border-radius:50%;
      background:rgba(10,10,10,0.85);
      border:1.5px solid rgba(255,255,255,0.2);
      color:#fff;
      font-size:0.9rem;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.2s;
      backdrop-filter:blur(8px);
      z-index:10;
    }
    #aL{margin-right:0.75rem;}
    #aR{margin-left:0.75rem;}
    .varr:hover{background:rgba(201,168,76,0.9);border-color:#c9a84c;color:#000;}
    .varr:disabled{opacity:0.15;pointer-events:none;}

    /* OVERFLOW */
    .vov{overflow:hidden;flex:1;min-width:0;}
    .vsl{
      display:flex;
      gap:16px;
      transition:transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    /* CARD — exactly 1/3 of overflow container */
    .vcard{
      flex:0 0 calc((100% - 32px) / 3);
      border-radius:16px;
      overflow:hidden;
      background:#1a0a0a;
      cursor:pointer;
      position:relative;
    }
    .vcard-img{
      width:100%;
      aspect-ratio:9/13;
      object-fit:cover;
      display:block;
      transition:opacity 0.3s;
    }
    .vcard-vid{
      position:absolute;
      inset:0;
      width:100%;height:100%;
      object-fit:cover;
      opacity:0;
      transition:opacity 0.3s;
    }
    .vcard:hover .vcard-vid{opacity:1;}
    .vcard:hover .vcard-img{opacity:0;}

    /* PLAY BUTTON */
    .vcard-play{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:56px;height:56px;
      border-radius:50%;
      background:rgba(201,168,76,0.25);
      border:2px solid rgba(255,255,255,0.7);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:1.2rem;
      pointer-events:none;
      transition:opacity 0.3s;
      backdrop-filter:blur(4px);
    }
    .vcard:hover .vcard-play{opacity:0;}

    /* CARD TITLE */
    .vcard-title{
      position:absolute;
      bottom:0;left:0;right:0;
      padding:0.75rem 1rem;
      background:rgba(0,0,0,0.65);
      font-size:0.9rem;
      font-weight:600;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      backdrop-filter:blur(4px);
    }

    /* DOTS */
    .vdots{
      display:flex;justify-content:center;gap:7px;
      margin-top:1.4rem;
    }
    .vdot{
      width:8px;height:8px;
      border-radius:50%;
      background:rgba(255,255,255,0.2);
      border:none;cursor:pointer;
      padding:0;
      transition:background 0.2s,transform 0.2s;
    }
    .vdot.active{background:#c9a84c;transform:scale(1.25);}

    /* EMPTY */
    .vempty{text-align:center;padding:5rem 2rem;color:#5a1a1a;width:100%;}
    .vempty i{font-size:2.5rem;display:block;margin-bottom:0.75rem;opacity:0.3;}

    /* LIGHTBOX */
    .vlb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;align-items:center;justify-content:center;padding:1rem;}
    .vlb.open{display:flex;}
    .vlb-in{position:relative;max-width:400px;width:100%;}
    .vlb-in video,.vlb-in img{width:100%;border-radius:16px;max-height:88vh;display:block;}
    .vlb-x{position:absolute;top:-14px;right:-14px;width:34px;height:34px;background:#c9a84c;border:none;border-radius:50%;color:#000;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    /* FOOTER */
    .vfooter{margin-top:4rem;border-top:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.3);}
    .vfooter-main{
      display:flex;align-items:center;justify-content:space-between;
      padding:2rem 3rem;gap:2rem;flex-wrap:wrap;
    }
    .vfooter-left{}
    .vfooter-left p{color:#aaa;font-size:0.85rem;margin-bottom:0.2rem;}
    .vfooter-left p:first-child{color:#ccc;font-weight:600;font-size:0.9rem;}
    .vfooter-right{text-align:right;}
    .vfooter-right p{color:#aaa;font-size:0.8rem;font-weight:600;margin-bottom:0.6rem;letter-spacing:0.5px;}
    .vfooter-social{display:flex;gap:1rem;justify-content:flex-end;}
    .vfooter-social a{color:rgba(255,255,255,0.4);font-size:1.1rem;text-decoration:none;transition:color 0.2s;}
    .vfooter-social a:hover{color:#c9a84c;}
    .vfooter-legal{
      border-top:1px solid rgba(255,255,255,0.06);
      padding:1rem 3rem;
      display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;
    }
    .vfooter-legal a{color:rgba(255,255,255,0.3);font-size:0.8rem;text-decoration:none;transition:color 0.2s;}
    .vfooter-legal a:hover{color:#c9a84c;}

    @media(max-width:900px){
      .vcard{flex:0 0 calc((100% - 16px) / 2);}
    }
    @media(max-width:560px){
      .vcard{flex:0 0 82%;}
      .vcp{padding:0 1rem;}
      .vsec{padding:0 0.5rem;}
    }
  </style>
  <script src="nav.js"></script>
</head>
<body>
<div class="vp">

  <div class="vh">
    <h1 class="vt">Discover with <span>Vibe</span></h1>
    <p class="vs">Explore trending reels from our creators</p>
  </div>

  <div class="vcp">
    <div class="vcr" id="vcr">
      <button class="vc active" data-cat="all">All</button>
      <button class="vc" data-cat="Events & Weddings">Events &amp; Weddings</button>
      <button class="vc" data-cat="Car Delivery">Car Delivery</button>
      <button class="vc" data-cat="Celebrities">Celebrities</button>
      <button class="vc" data-cat="Outfit Shoots">Outfit Shoots</button>
      <button class="vc" data-cat="Concerts">Concerts</button>
      <button class="vc" data-cat="Collaborations">Collaborations</button>
      <button class="vc" data-cat="Decor & Interiors">Decor &amp; Interiors</button>
      <button class="vc" data-cat="Caterers">Caterers</button>
      <button class="vc" data-cat="Testimonials">Testimonials</button>
    </div>
  </div>

  <div class="vsec">
    <button class="varr" id="aL" onclick="slide(-1)"><i class="fas fa-chevron-left"></i></button>
    <div class="vov">
      <div class="vsl" id="vsl">
        <div class="vempty"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
      </div>
    </div>
    <button class="varr" id="aR" onclick="slide(1)"><i class="fas fa-chevron-right"></i></button>
  </div>
  <div class="vdots" id="vdots"></div>

</div>

<div class="vlb" id="vlb">
  <div class="vlb-in">
    <button class="vlb-x" onclick="closeLb()"><i class="fas fa-times"></i></button>
    <div id="vlbc"></div>
  </div>
</div>

<script>
var _all=[],_fil=[],_cat='all',_i=0;

fetch('https://firestore.googleapis.com/v1/projects/hash-shoots/databases/(default)/documents/vibe_items?key=AIzaSyAtkcHfgNx9xEcyMC50eRX5VPv1r7O5XyE')
  .then(function(r){return r.json();})
  .then(function(d){
    _all=[];
    (d.documents||[]).forEach(function(doc){
      var f=doc.fields,item={id:doc.name.split('/').pop()};
      Object.keys(f).forEach(function(k){item[k]=f[k].stringValue||'';});
      _all.push(item);
    });
    render();
  })
  .catch(function(e){
    document.getElementById('vsl').innerHTML='<div class="vempty"><i class="fas fa-exclamation-circle"></i><p>'+e.message+'</p></div>';
  });

function th(item){
  var t=item.thumbnail||'',u=item.url||'';
  if(t&&/\.(jpg|jpeg|png|webp)/i.test(t))return t;
  if(u&&u.includes('cloudinary.com'))
    return u.replace('/video/upload/','/video/upload/so_0,w_600,h_800,c_fill,f_jpg/').replace(/\.(mp4|mov|webm|avi)/i,'.jpg');
  return '';
}

function vis(){return window.innerWidth<=560?1:window.innerWidth<=900?2:3;}
function cw(){var c=document.querySelector('.vcard');return c?c.offsetWidth+16:0;}

function render(){
  _fil=_cat==='all'?_all:_all.filter(function(i){return i.category===_cat;});
  _i=0;
  var sl=document.getElementById('vsl');
  sl.style.transform='translateX(0)';
  if(!_fil.length){
    sl.innerHTML='<div class="vempty"><i class="fas fa-photo-video"></i><p>No content yet.</p></div>';
    document.getElementById('aL').disabled=true;
    document.getElementById('aR').disabled=true;
    return;
  }
  sl.innerHTML=_fil.map(function(item,idx){
    var t=th(item),u=item.url||'';
    return '<div class="vcard" onclick="openLb('+idx+')">'
      +(t?'<img class="vcard-img" src="'+t+'" alt="'+item.title+'" loading="lazy"/>':'<div style="width:100%;aspect-ratio:3/4;background:#2a0808;display:flex;align-items:center;justify-content:center;color:#e8453c;font-size:3rem;"><i class=\'fas fa-film\'></i></div>')
      +(u?'<video class="vcard-vid" src="'+u+'" muted loop playsinline preload="none" onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0;"></video>':'')
      +'<div class="vcard-play"><i class="fas fa-play"></i></div>'
      +(item.title?'<div class="vcard-title">'+item.title+'</div>':'')
      +'</div>';
  }).join('');
  upd();
}

function slide(d){
  var max=Math.max(0,_fil.length-vis());
  _i=Math.max(0,Math.min(_i+d,max));
  document.getElementById('vsl').style.transform='translateX(-'+(_i*cw())+'px)';
  upd();
}
function upd(){
  document.getElementById('aL').disabled=(_i===0);
  document.getElementById('aR').disabled=(_i>=_fil.length-vis());
  var dots=document.getElementById('vdots');
  var pages=Math.max(1,_fil.length-vis()+1);
  dots.innerHTML=Array.from({length:pages},function(_,p){
    return '<button class="vdot'+(p===_i?' active':'')+'" onclick="jumpTo('+p+')"></button>';
  }).join('');
}
function jumpTo(p){
  _i=p;
  document.getElementById('vsl').style.transform='translateX(-'+(_i*cw())+'px)';
  upd();
}

document.getElementById('vcr').addEventListener('click',function(e){
  var b=e.target.closest('.vc');if(!b)return;
  document.querySelectorAll('.vc').forEach(function(x){x.classList.remove('active');});
  b.classList.add('active');
  _cat=b.dataset.cat;
  render();
});

function openLb(idx){
  var item=_fil[idx],u=item.url||'',t=th(item);
  document.getElementById('vlbc').innerHTML=u
    ?'<video src="'+u+'" controls autoplay playsinline style="width:100%;border-radius:16px;max-height:88vh;"></video>'
    :(t?'<img src="'+t+'" style="width:100%;border-radius:16px;"/>':'');
  document.getElementById('vlb').classList.add('open');
}
function closeLb(){
  var v=document.querySelector('#vlbc video');if(v)v.pause();
  document.getElementById('vlb').classList.remove('open');
  document.getElementById('vlbc').innerHTML='';
}
document.getElementById('vlb').addEventListener('click',function(e){if(e.target===this)closeLb();});
window.addEventListener('resize',function(){
  document.getElementById('vsl').style.transform='translateX(-'+(_i*cw())+'px)';
  upd();
});
</script>
<script src="hs-feedback-widget.js"></script>

      <p>&copy; 2025 OG Shoots Luxe</p>

      </div>
    </div>

</footer>
</body>
</html>
