<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Discover with Vibe – OG Shoots</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a0a;font-family:'Inter',sans-serif;color:#fff;min-height:100vh;overflow-x:hidden;}

    .vibe-page{padding:7rem 0 5rem;}

    /* HEADER */
    .vibe-header{text-align:center;padding:0 2rem;margin-bottom:2.5rem;}
    .vibe-title{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;color:#fff;margin-bottom:0.5rem;letter-spacing:-1px;}
    .vibe-title span{color:#c9a84c;}
    .vibe-subtitle{color:#706050;font-size:1rem;}

    /* CATEGORY PILLS */
    .vibe-cats-wrap{padding:0 2rem;margin-bottom:2.5rem;overflow-x:auto;scrollbar-width:none;}
    .vibe-cats-wrap::-webkit-scrollbar{display:none;}
    .vibe-cats{display:flex;gap:0.6rem;width:max-content;margin:0 auto;}
    .vibe-cat{padding:0.55rem 1.4rem;border-radius:50px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#888;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap;}
    .vibe-cat.active,.vibe-cat:hover{background:#c9a84c;color:#fff;border-color:#c9a84c;}

    /* SLIDER */
    .vibe-slider-wrap{position:relative;padding:0 3rem;}
    .vibe-overflow{overflow:hidden;}
    .vibe-slider{display:flex;gap:1.5rem;transition:transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform;}

    /* CARD */
    .vibe-card{
      flex:0 0 calc(33.333% - 1rem);
      border-radius:20px;overflow:hidden;
      background:#111;cursor:pointer;
      position:relative;
    }
    .vibe-card-media{
      position:relative;
      width:100%;
      padding-top:133.33%; /* 3:4 aspect ratio */
      overflow:hidden;
      background:#111;
    }
    .vibe-card-media img,
    .vibe-card-media video{
      position:absolute;
      top:0;left:0;
      width:100%;height:100%;
      object-fit:cover;
      display:block;
      transition:opacity 0.35s;
    }
    .vibe-card-media video{opacity:0;}
    .vibe-card:hover .vibe-card-media video{opacity:1;}
    .vibe-card:hover .vibe-card-media img{opacity:0;}
    .vibe-card-info{padding:0.85rem 1rem;}
    .vibe-card-title{font-size:0.95rem;font-weight:700;color:#fff;margin-bottom:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .vibe-card-cat{font-size:0.75rem;color:#c9a84c;font-weight:600;}

    /* ARROWS */
    .vibe-arrow{
      position:absolute;top:40%;transform:translateY(-50%);
      width:48px;height:48px;border-radius:50%;
      background:rgba(10,10,10,0.9);border:1px solid rgba(255,255,255,0.15);
      color:#fff;font-size:1rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      z-index:10;transition:all 0.2s;
    }
    .vibe-arrow:hover{background:#c9a84c;border-color:#c9a84c;color:#000;}
    .vibe-arrow-l{left:0;}
    .vibe-arrow-r{right:0;}
    .vibe-arrow[disabled]{opacity:0.3;pointer-events:none;}

    /* EMPTY */
    .vibe-empty{text-align:center;padding:5rem;color:#484030;flex:1;}
    .vibe-empty i{font-size:3rem;display:block;margin-bottom:1rem;opacity:0.3;}

    /* LIGHTBOX */
    .lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;align-items:center;justify-content:center;}
    .lb.open{display:flex;}
    .lb-inner{position:relative;max-width:420px;width:90%;}
    .lb-inner video,.lb-inner img{width:100%;border-radius:20px;max-height:85vh;display:block;}
    .lb-close{position:absolute;top:-16px;right:-16px;width:36px;height:36px;background:#c9a84c;border:none;border-radius:50%;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    @media(max-width:900px){.vibe-card{flex:0 0 calc(50% - 0.75rem);}}
    @media(max-width:560px){.vibe-card{flex:0 0 85%;}.vibe-slider-wrap{padding:0 2rem;}}
  </style>
  <script src="nav.js"></script>
</head>
<body>

<div class="vibe-page">
  <div class="vibe-header">
    <h1 class="vibe-title">Discover with <span>Vibe</span></h1>
    <p class="vibe-subtitle">Explore trending reels from our creators</p>
  </div>

  <div class="vibe-cats-wrap">
    <div class="vibe-cats" id="vibeCats">
      <button class="vibe-cat active" data-cat="all">All</button>
      <button class="vibe-cat" data-cat="Events & Weddings">Events &amp; Weddings</button>
      <button class="vibe-cat" data-cat="Car Delivery">Car Delivery</button>
      <button class="vibe-cat" data-cat="Celebrities">Celebrities</button>
      <button class="vibe-cat" data-cat="Outfit Shoots">Outfit Shoots</button>
      <button class="vibe-cat" data-cat="Concerts">Concerts</button>
      <button class="vibe-cat" data-cat="Collaborations">Collaborations</button>
      <button class="vibe-cat" data-cat="Decor & Interiors">Decor &amp; Interiors</button>
      <button class="vibe-cat" data-cat="Caterers">Caterers</button>
      <button class="vibe-cat" data-cat="Testimonials">Testimonials</button>
    </div>
  </div>

  <div class="vibe-slider-wrap">
    <button class="vibe-arrow vibe-arrow-l" id="arrowL" onclick="slide(-1)"><i class="fas fa-chevron-left"></i></button>
    <div class="vibe-overflow">
      <div class="vibe-slider" id="vibeSlider">
        <div class="vibe-empty"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
      </div>
    </div>
    <button class="vibe-arrow vibe-arrow-r" id="arrowR" onclick="slide(1)"><i class="fas fa-chevron-right"></i></button>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLb()"><i class="fas fa-times"></i></button>
    <div id="lbContent"></div>
  </div>
</div>

<script>
var _items = [];
var _filtered = [];
var _cat = 'all';
var _idx = 0;

// Load from Firestore REST API
fetch('https://firestore.googleapis.com/v1/projects/hash-shoots/databases/(default)/documents/vibe_items?key=AIzaSyAtkcHfgNx9xEcyMC50eRX5VPv1r7O5XyE')
  .then(function(r){ return r.json(); })
  .then(function(data){
    _items = [];
    (data.documents||[]).forEach(function(d){
      var f=d.fields, item={id:d.name.split('/').pop()};
      Object.keys(f).forEach(function(k){ item[k]=f[k].stringValue||''; });
      _items.push(item);
    });
    render();
  })
  .catch(function(e){
    document.getElementById('vibeSlider').innerHTML='<div class="vibe-empty"><i class="fas fa-exclamation-circle"></i><p>'+e.message+'</p></div>';
  });

function getThumb(item){
  var t=item.thumbnail||'', u=item.url||'';
  if(t && /\.(jpg|jpeg|png|webp)/i.test(t)) return t;
  if(u && u.includes('cloudinary.com')){
    return u.replace('/video/upload/','/video/upload/so_0,w_400,h_600,c_fill,f_jpg/').replace(/\.(mp4|mov|webm|avi)/i,'.jpg');
  }
  return '';
}

function render(){
  _filtered = _cat==='all' ? _items : _items.filter(function(i){ return i.category===_cat; });
  _idx = 0;
  var slider = document.getElementById('vibeSlider');
  slider.style.transform = 'translateX(0)';

  if(!_filtered.length){
    slider.innerHTML='<div class="vibe-empty"><i class="fas fa-photo-video"></i><p>No content yet.</p></div>';
    document.getElementById('arrowL').disabled=true;
    document.getElementById('arrowR').disabled=true;
    return;
  }

  slider.innerHTML = _filtered.map(function(item,idx){
    var t=getThumb(item), u=item.url||'';
    return '<div class="vibe-card" onclick="openLb('+idx+')">'
      +'<div class="vibe-card-media">'
      +(t?'<img src="'+t+'" alt="'+item.title+'" loading="lazy"/>':'')
      +(u?'<video src="'+u+'" muted loop playsinline preload="none" onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0;"></video>':'')
      +'</div>'
      +'<div class="vibe-card-info">'
      +'<div class="vibe-card-title">'+item.title+'</div>'
      +'<div class="vibe-card-cat">'+item.category+'</div>'
      +'</div></div>';
  }).join('');

  updateArrows();
}

function visCount(){
  return window.innerWidth<=560?1:window.innerWidth<=900?2:3;
}
function cardW(){
  var c=document.querySelector('.vibe-card');
  return c ? c.offsetWidth+24 : 0;
}
function slide(dir){
  var max=_filtered.length-visCount();
  _idx=Math.max(0,Math.min(_idx+dir,max));
  document.getElementById('vibeSlider').style.transform='translateX(-'+(_idx*cardW())+'px)';
  updateArrows();
}
function updateArrows(){
  document.getElementById('arrowL').disabled=(_idx===0);
  document.getElementById('arrowR').disabled=(_idx>=_filtered.length-visCount());
}

// Category filter
document.getElementById('vibeCats').addEventListener('click',function(e){
  var btn=e.target.closest('.vibe-cat');
  if(!btn) return;
  document.querySelectorAll('.vibe-cat').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  _cat=btn.dataset.cat;
  render();
});

// Lightbox
function openLb(idx){
  var item=_filtered[idx];
  var u=item.url||'', t=getThumb(item);
  document.getElementById('lbContent').innerHTML=u
    ?'<video src="'+u+'" controls autoplay playsinline style="width:100%;border-radius:20px;max-height:85vh;"></video>'
    :(t?'<img src="'+t+'" style="width:100%;border-radius:20px;"/>':'');
  document.getElementById('lb').classList.add('open');
}
function closeLb(){
  var v=document.querySelector('#lbContent video');
  if(v){v.pause();}
  document.getElementById('lb').classList.remove('open');
  document.getElementById('lbContent').innerHTML='';
}
document.getElementById('lb').addEventListener('click',function(e){if(e.target===this)closeLb();});
window.addEventListener('resize',function(){
  document.getElementById('vibeSlider').style.transform='translateX(-'+(_idx*cardW())+'px)';
  updateArrows();
});
</script>

<script src="hs-feedback-widget.js"></script>
</body>
</html>
