<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Discover with Vibe – OG Shoots</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a0a;font-family:'Inter',sans-serif;color:#fff;min-height:100vh;}
    .vibe-page{padding:7rem 2rem 5rem;max-width:1400px;margin:0 auto;}
    .vibe-header{text-align:center;margin-bottom:2.5rem;}
    .vibe-title{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;color:#fff;margin-bottom:0.5rem;letter-spacing:-1px;}
    .vibe-title span{color:#c9a84c;}
    .vibe-subtitle{color:#706050;font-size:1rem;}
    /* CATS */
    .vibe-cats{display:flex;gap:0.6rem;flex-wrap:wrap;justify-content:center;margin-bottom:2.5rem;}
    .vibe-cat{padding:0.55rem 1.4rem;border-radius:50px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#888;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap;}
    .vibe-cat.active,.vibe-cat:hover{background:#c9a84c;color:#fff;border-color:#c9a84c;}
    /* GRID */
    .vibe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
    .vibe-card{border-radius:20px;overflow:hidden;background:#111;cursor:pointer;transition:transform 0.3s,box-shadow 0.3s;}
    .vibe-card:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,0.6);}
    .vibe-card img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
    .vibe-card-info{padding:0.85rem 1rem;}
    .vibe-card-title{font-size:0.95rem;font-weight:700;color:#fff;margin-bottom:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .vibe-card-cat{font-size:0.75rem;color:#c9a84c;font-weight:600;}
    .vibe-empty{text-align:center;padding:5rem;color:#484030;grid-column:1/-1;}
    .vibe-empty i{font-size:3rem;display:block;margin-bottom:1rem;opacity:0.3;}
    /* LIGHTBOX */
    .lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;align-items:center;justify-content:center;}
    .lb.open{display:flex;}
    .lb-inner{position:relative;max-width:420px;width:90%;}
    .lb-inner video,.lb-inner img{width:100%;border-radius:20px;max-height:85vh;display:block;}
    .lb-close{position:absolute;top:-16px;right:-16px;width:36px;height:36px;background:#c9a84c;border:none;border-radius:50%;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    @media(max-width:900px){.vibe-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:500px){.vibe-grid{grid-template-columns:1fr;}}
  </style>
  <script src="nav.js"></script>
</head>
<body>

<div class="vibe-page">
  <div class="vibe-header">
    <h1 class="vibe-title">Discover with <span>Vibe</span></h1>
    <p class="vibe-subtitle">Explore trending reels from our creators</p>
  </div>

  <div class="vibe-cats" id="vibeCats">
    <button class="vibe-cat active" data-cat="all">All</button>
    <button class="vibe-cat" data-cat="Events & Weddings">Events &amp; Weddings</button>
    <button class="vibe-cat" data-cat="Car Delivery">Car Delivery</button>
    <button class="vibe-cat" data-cat="Celebrities">Celebrities</button>
    <button class="vibe-cat" data-cat="Outfit Shoots">Outfit Shoots</button>
    <button class="vibe-cat" data-cat="Concerts">Concerts</button>
    <button class="vibe-cat" data-cat="Collaborations">Collaborations</button>
    <button class="vibe-cat" data-cat="Decor & Interiors">Decor &amp; Interiors</button>
    <button class="vibe-cat" data-cat="Caterers">Caterers</button>
    <button class="vibe-cat" data-cat="Testimonials">Testimonials</button>
  </div>

  <div class="vibe-grid" id="vibeGrid">
    <div class="vibe-empty"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLb()"><i class="fas fa-times"></i></button>
    <div id="lbContent"></div>
  </div>
</div>

<script>
var _items = [];
var _cat = 'all';

fetch('https://firestore.googleapis.com/v1/projects/hash-shoots/databases/(default)/documents/vibe_items?key=AIzaSyAtkcHfgNx9xEcyMC50eRX5VPv1r7O5XyE')
  .then(function(r){ return r.json(); })
  .then(function(data){
    _items = [];
    (data.documents||[]).forEach(function(d){
      var f=d.fields, item={id:d.name.split('/').pop()};
      Object.keys(f).forEach(function(k){ item[k]=f[k].stringValue||''; });
      _items.push(item);
    });
    render();
  })
  .catch(function(e){
    document.getElementById('vibeGrid').innerHTML='<div class="vibe-empty"><i class="fas fa-exclamation-circle"></i><p>Error loading: '+e.message+'</p></div>';
  });

function thumb(item){
  var t = item.thumbnail||'';
  var u = item.url||'';
  if(t && t.match(/\.(jpg|jpeg|png|webp)/i)) return t;
  if(u && u.includes('cloudinary.com')){
    return u.replace('/video/upload/','/video/upload/so_0,w_400,h_600,c_fill,f_jpg/').replace(/\.(mp4|mov|webm|avi)/i,'.jpg');
  }
  return t;
}

function render(){
  var filtered = _cat==='all' ? _items : _items.filter(function(i){ return i.category===_cat; });
  var grid = document.getElementById('vibeGrid');
  if(!filtered.length){
    grid.innerHTML='<div class="vibe-empty"><i class="fas fa-photo-video"></i><p>No content yet.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(function(item,idx){
    var t = thumb(item);
    return '<div class="vibe-card" onclick="openLb('+idx+')">'
      +(t?'<img src="'+t+'" alt="'+item.title+'" loading="lazy" onerror="this.style.background=\'#1a1a1a\';this.style.aspectRatio=\'3/4\'"/>':'<div style="width:100%;aspect-ratio:3/4;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#c9a84c;font-size:3rem;"><i class=\'fas fa-film\'></i></div>')
      +'<div class="vibe-card-info"><div class="vibe-card-title">'+item.title+'</div><div class="vibe-card-cat">'+item.category+'</div></div>'
      +'</div>';
  }).join('');
}

document.getElementById('vibeCats').addEventListener('click', function(e){
  var btn = e.target.closest('.vibe-cat');
  if(!btn) return;
  document.querySelectorAll('.vibe-cat').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  _cat = btn.dataset.cat;
  render();
});

function openLb(idx){
  var filtered = _cat==='all' ? _items : _items.filter(function(i){ return i.category===_cat; });
  var item = filtered[idx];
  var url = item.url||'';
  var content = document.getElementById('lbContent');
  content.innerHTML = url
    ? '<video src="'+url+'" controls autoplay playsinline style="width:100%;border-radius:20px;max-height:85vh;"></video>'
    : '<img src="'+thumb(item)+'" style="width:100%;border-radius:20px;"/>';
  document.getElementById('lb').classList.add('open');
}

function closeLb(){
  var v = document.querySelector('#lbContent video');
  if(v) v.pause();
  document.getElementById('lb').classList.remove('open');
  document.getElementById('lbContent').innerHTML='';
}

document.getElementById('lb').addEventListener('click', function(e){ if(e.target===this) closeLb(); });
</script>

<script src="hs-feedback-widget.js"></script>
</body>
</html>
