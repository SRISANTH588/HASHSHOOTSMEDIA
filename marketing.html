<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketing Portal — OG Shoots</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#080808;color:#f0ece0;min-height:100vh;}
    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .login-card{background:#111;border:1px solid rgba(201,168,76,0.25);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(0,0,0,0.6);}
    .login-logo{text-align:center;margin-bottom:2rem;}
    .login-logo h1{font-size:1.6rem;font-weight:900;color:#fff;}
    .login-logo h1 span{color:#c9a84c;}
    .login-logo p{font-size:0.82rem;color:#9a9080;margin-top:0.3rem;}
    .form-group{margin-bottom:1rem;}
    .form-group label{font-size:0.78rem;font-weight:700;color:#9a9080;display:block;margin-bottom:0.4rem;}
    .form-group input{width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:10px;padding:0.8rem 1rem;color:#fff;font-family:inherit;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
    .form-group input:focus{border-color:#c9a84c;}
    .btn-login{width:100%;background:linear-gradient(135deg,#c9a84c,#a07830);color:#000;border:none;border-radius:12px;padding:0.9rem;font-size:0.95rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:0.5rem;}
    .err{display:none;background:rgba(244,67,54,0.1);border:1px solid rgba(244,67,54,0.3);color:#f44336;border-radius:8px;padding:0.6rem 1rem;font-size:0.82rem;margin-bottom:1rem;}
    /* PORTAL */
    .portal{display:none;}
    nav{background:rgba(10,10,10,0.95);border-bottom:1px solid rgba(201,168,76,0.15);padding:0.85rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .nav-logo{font-size:1.2rem;font-weight:900;color:#fff;}.nav-logo span{color:#c9a84c;}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-badge{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);color:#c9a84c;font-size:0.7rem;font-weight:700;padding:0.25rem 0.85rem;border-radius:50px;}
    .btn-logout{background:transparent;border:1px solid rgba(201,168,76,0.3);color:#c9a84c;border-radius:8px;padding:0.35rem 0.85rem;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:inherit;}
    .tab-nav{background:#0f0f0f;border-bottom:1px solid rgba(201,168,76,0.06);padding:0 2rem;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;}
    .tab-nav::-webkit-scrollbar{display:none;}
    .tab-btn{padding:0.85rem 1.25rem;background:none;border:none;border-bottom:2px solid transparent;color:#9a9080;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:0.5rem;transition:all 0.2s;}
    .tab-btn.active{color:#c9a84c;border-bottom-color:#c9a84c;}
    .tab-btn .badge{background:#c9a84c;color:#000;font-size:0.55rem;font-weight:900;padding:0.1rem 0.4rem;border-radius:50px;}
    .page{max-width:1100px;margin:2rem auto;padding:0 1.5rem;}
    .panel{display:none;}.panel.active{display:block;}
    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
    .stat{background:#1a1a1a;border:1px solid rgba(201,168,76,0.12);border-radius:14px;padding:1.25rem;text-align:center;}
    .stat .num{font-size:2rem;font-weight:900;color:#c9a84c;}
    .stat .lbl{font-size:0.72rem;color:#9a9080;margin-top:0.2rem;}
    /* CARDS */
    .card{background:#111;border:1px solid rgba(201,168,76,0.12);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:0.85rem;}
    .card-title{font-size:0.92rem;font-weight:800;color:#fff;margin-bottom:0.2rem;}
    .card-meta{font-size:0.72rem;color:#9a9080;}
    .card-msg{background:#0a0a0a;border-radius:8px;padding:0.65rem 0.9rem;font-size:0.82rem;color:#c8a0a0;line-height:1.7;border-left:3px solid rgba(201,168,76,0.3);margin:0.75rem 0;}
    .btn-accept{background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.3);color:#4caf50;padding:0.3rem 0.85rem;border-radius:6px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-done{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:#c9a84c;padding:0.3rem 0.85rem;border-radius:6px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:inherit;}
    .badge-accepted{background:rgba(33,150,243,0.12);border:1px solid rgba(33,150,243,0.3);color:#2196f3;font-size:0.65rem;font-weight:700;padding:0.15rem 0.55rem;border-radius:50px;}
    .badge-done{background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.3);color:#4caf50;font-size:0.65rem;font-weight:700;padding:0.15rem 0.55rem;border-radius:50px;}
    .badge-type{font-size:0.6rem;font-weight:800;padding:0.15rem 0.5rem;border-radius:50px;letter-spacing:1px;text-transform:uppercase;}
    .sec-title{font-size:1rem;font-weight:800;color:#fff;margin-bottom:1rem;display:flex;align-items:center;gap:0.6rem;}
    .sec-title i{color:#c9a84c;}
    .empty{text-align:center;padding:2.5rem;background:#1a1a1a;border-radius:14px;color:#6a5a40;font-size:0.85rem;}
    .empty i{font-size:2rem;opacity:0.2;display:block;margin-bottom:0.75rem;}
    .booking-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;}
    .status-badge{font-size:0.65rem;font-weight:700;padding:0.2rem 0.65rem;border-radius:50px;}
    .s-pending{background:rgba(255,152,0,0.15);color:#ff9800;border:1px solid rgba(255,152,0,0.3);}
    .s-confirmed{background:rgba(76,175,80,0.15);color:#4caf50;border:1px solid rgba(76,175,80,0.3);}
    .s-completed{background:rgba(33,150,243,0.15);color:#2196f3;border:1px solid rgba(33,150,243,0.3);}
    @media(max-width:600px){.tab-btn{padding:0.75rem 0.85rem;font-size:0.75rem;}.stats{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap" style="display:none;">
  <div class="login-card">
    <div class="login-logo">
      <h1><span>OG</span> SHOOTS</h1>
      <p>Marketing Team Portal</p>
    </div>
    <div class="err" id="loginErr">Invalid credentials.</div>
    <div class="form-group">
      <label><i class="fas fa-user"></i> Username</label>
      <input type="text" id="mktUser" placeholder="Enter username" onkeydown="if(event.key==='Enter') mktLogin()"/>
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="mktPass" placeholder="Enter password" onkeydown="if(event.key==='Enter') mktLogin()"/>
    </div>
    <button class="btn-login" onclick="mktLogin()"><i class="fas fa-sign-in-alt"></i> &nbsp;Login</button>
  </div>
</div>

<!-- PORTAL -->
<div class="portal" id="portal">
  <nav>
    <div class="nav-logo"><span>OG</span> SHOOTS <sup style="font-size:0.4em;color:#c9a84c;letter-spacing:2px;">MARKETING</sup></div>
    <div class="nav-right">
      <span class="nav-badge"><i class="fas fa-bullhorn"></i> Marketing Team</span>
      <button class="btn-logout" onclick="mktLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchMktTab('dashboard',this)"><i class="fas fa-chart-bar"></i> Dashboard</button>
    <button class="tab-btn" onclick="switchMktTab('service',this)"><i class="fas fa-concierge-bell"></i> Service Enquiries <span class="badge" id="svcBadge" style="display:none;">0</span></button>
    <button class="tab-btn" onclick="switchMktTab('marketing',this)"><i class="fas fa-bullhorn"></i> Marketing Enquiries <span class="badge" id="mktBadge" style="display:none;">0</span></button>
    <button class="tab-btn" onclick="switchMktTab('business',this)"><i class="fas fa-briefcase"></i> Business Enquiries <span class="badge" id="bizBadge" style="display:none;">0</span></button>
    <button class="tab-btn" onclick="switchMktTab('leads',this)"><i class="fas fa-user-plus"></i> Leads <span class="badge" id="leadsBadge" style="display:none;">0</span></button>
    <button class="tab-btn" onclick="switchMktTab('meetings',this)"><i class="fas fa-calendar-alt"></i> Meetings</button>
    <button class="tab-btn" onclick="switchMktTab('invitations',this)"><i class="fas fa-envelope-open-text"></i> Invitations</button>
    <button class="tab-btn" onclick="switchMktTab('profile',this)"><i class="fas fa-user"></i> Profile</button>
    <button class="tab-btn" onclick="switchMktTab('bank',this)"><i class="fas fa-university"></i> Bank Account</button>
  </div>

  <div class="page">

    <!-- DASHBOARD -->
    <div class="panel active" id="panel-dashboard">
      <div class="stats" id="statsRow"></div>
      <div class="sec-title"><i class="fas fa-clock"></i> Recent Enquiries</div>
      <div id="recentList"></div>
    </div>

    <!-- SERVICE ENQUIRIES -->
    <div class="panel" id="panel-service">
      <div class="sec-title"><i class="fas fa-concierge-bell"></i> Service Enquiries</div>
      <div id="svcList"></div>
    </div>

    <!-- MARKETING ENQUIRIES -->
    <div class="panel" id="panel-marketing">
      <div class="sec-title"><i class="fas fa-bullhorn"></i> Marketing Enquiries</div>
      <div id="mktList"></div>
    </div>

    <!-- BUSINESS ENQUIRIES -->
    <div class="panel" id="panel-business">
      <div class="sec-title"><i class="fas fa-briefcase"></i> Business Enquiries</div>
      <div id="bizList"></div>
    </div>

    <!-- LEADS -->
    <div class="panel" id="panel-leads">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.75rem;">
        <div class="sec-title" style="margin-bottom:0;"><i class="fas fa-user-plus"></i> Lead Management</div>
        <button onclick="openAddLead()" style="background:linear-gradient(135deg,#c9a84c,#a07830);color:#000;border:none;border-radius:10px;padding:0.55rem 1.25rem;font-size:0.82rem;font-weight:800;cursor:pointer;font-family:inherit;"><i class="fas fa-plus"></i> Add Lead</button>
      </div>
      <div id="leadsList"></div>
    </div>

    <!-- MEETINGS -->
    <div class="panel" id="panel-meetings">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.75rem;">
        <div class="sec-title" style="margin-bottom:0;"><i class="fas fa-calendar-alt"></i> Meetings</div>
        <button onclick="openAddMeeting()" style="background:linear-gradient(135deg,#c9a84c,#a07830);color:#000;border:none;border-radius:10px;padding:0.55rem 1.25rem;font-size:0.82rem;font-weight:800;cursor:pointer;font-family:inherit;"><i class="fas fa-plus"></i> Schedule Meeting</button>
      </div>
      <div id="meetingsList"></div>
    </div>

    <!-- INVITATIONS -->
    <div class="panel" id="panel-invitations">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.75rem;">
        <div class="sec-title" style="margin-bottom:0;"><i class="fas fa-envelope-open-text"></i> Invitations</div>
        <button onclick="openSendInvite()" style="background:linear-gradient(135deg,#c9a84c,#a07830);color:#000;border:none;border-radius:10px;padding:0.55rem 1.25rem;font-size:0.82rem;font-weight:800;cursor:pointer;font-family:inherit;"><i class="fas fa-paper-plane"></i> Send Invitation</button>
      </div>
      <div id="invitationsList"></div>
    </div>

    <!-- PROFILE -->
    <div class="panel" id="panel-profile">
      <div class="sec-title"><i class="fas fa-user"></i> My Profile</div>
      <div style="background:#111;border:1px solid rgba(201,168,76,0.15);border-radius:16px;padding:1.5rem;max-width:500px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
          <div><label style="font-size:0.72rem;color:#9a9080;font-weight:600;display:block;margin-bottom:0.3rem;">Full Name *</label><input type="text" id="mkt_pName" placeholder="Your name" style="width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:0.65rem 0.9rem;color:#fff;font-family:inherit;font-size:0.85rem;outline:none;"/></div>
          <div><label style="font-size:0.72rem;color:#9a9080;font-weight:600;display:block;margin-bottom:0.3rem;">Phone *</label><input type="tel" id="mkt_pPhone" placeholder="+91 XXXXXXXXXX" style="width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:0.65rem 0.9rem;color:#fff;font-family:inherit;font-size:0.85rem;outline:none;"/></div>
        </div>
        <div style="margin-bottom:0.75rem;"><label style="font-size:0.72rem;color:#9a9080;font-weight:600;display:block;margin-bottom:0.3rem;">Email</label><input type="email" id="mkt_pEmail" placeholder="you@email.com" style="width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:0.65rem 0.9rem;color:#fff;font-family:inherit;font-size:0.85rem;outline:none;"/></div>
        <div style="margin-bottom:1rem;"><label style="font-size:0.72rem;color:#9a9080;font-weight:600;display:block;margin-bottom:0.3rem;">Role / Designation</label><input type="text" id="mkt_pRole" placeholder="e.g. Marketing Executive" style="width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:0.65rem 0.9rem;color:#fff;font-family:inherit;font-size:0.85rem;outline:none;"/></div>
        <button onclick="saveMktProfile()" style="background:linear-gradient(135deg,#c9a84c,#a07830);color:#000;border:none;border-radius:10px;padding:0.75rem 2rem;font-size:0.88rem;font-weight:800;cursor:pointer;font-family:inherit;"><i class="fas fa-save"></i> Save Profile</button>
        <div id="profileToast" style="display:none;margin-top:0.75rem;background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.3);color:#4caf50;border-radius:8px;padding:0.5rem 1rem;font-size:0.82rem;font-weight:600;"><i class="fas fa-check-circle"></i> Profile saved!</div>
      </div>
    </div>

    <!-- BANK ACCOUNT -->
    <div class="panel" id="panel-bank">
      <div class="sec-title"><i class="fas fa-university"></i> Bank Account</div>
      <div style="background:#111;border:1px solid rgba(201,168,76,0.15);border-radius:16px;padding:1.5rem;max-width:500px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
          <div><label style="font-size:0.72rem;color:#9a9080;font-weight:600;display:block;margin-bottom:0.3rem;">Account Holder Name *</label><input type="text" id="mkt_bName" placeholder="Full name as per bank" style="width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:0.65rem 0.9rem;color:#fff;font-family:inherit;font-size:0.85rem;outline:none;"/></div>
          <div><label style="font-size:0.72rem;color:#9a9080;font-weight:600;display:block;margin-bottom:0.3rem;">Bank Name *</label><input type="text" id="mkt_bBank" placeholder="e.g. HDFC Bank" style="width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:0.65rem 0.9rem;color:#fff;font-family:inherit;font-size:0.85rem;outline:none;"/></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
          <div><label style="font-size:0.72rem;color:#9a9080;font-weight:600;display:block;margin-bottom:0.3rem;">Account Number *</label><input type="text" id="mkt_bAccNo" placeholder="Account number" style="width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:0.65rem 0.9rem;color:#fff;font-family:inherit;font-size:0.85rem;outline:none;"/></div>
          <div><label style="font-size:0.72rem;color:#9a9080;font-weight:600;display:block;margin-bottom:0.3rem;">IFSC Code *</label><input type="text" id="mkt_bIFSC" placeholder="e.g. HDFC0001234" style="width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:0.65rem 0.9rem;color:#fff;font-family:inherit;font-size:0.85rem;outline:none;text-transform:uppercase;"/></div>
        </div>
        <div style="margin-bottom:1rem;"><label style="font-size:0.72rem;color:#9a9080;font-weight:600;display:block;margin-bottom:0.3rem;">UPI ID (Optional)</label><input type="text" id="mkt_bUPI" placeholder="name@upi" style="width:100%;background:#0a0a0a;border:1px solid rgba(201,168,76,0.15);border-radius:9px;padding:0.65rem 0.9rem;color:#fff;font-family:inherit;font-size:0.85rem;outline:none;"/></div>
        <button onclick="saveMktBank()" style="background:linear-gradient(135deg,#c9a84c,#a07830);color:#000;border:none;border-radius:10px;padding:0.75rem 2rem;font-size:0.88rem;font-weight:800;cursor:pointer;font-family:inherit;"><i class="fas fa-save"></i> Save Bank Details</button>
        <div id="bankToast" style="display:none;margin-top:0.75rem;background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.3);color:#4caf50;border-radius:8px;padding:0.5rem 1rem;font-size:0.82rem;font-weight:600;"><i class="fas fa-check-circle"></i> Bank details saved!</div>
      </div>
    </div>

  </div>
</div>

<script>
  // Auth guard — allow if logged in via main login page
  if(localStorage.getItem('hs_role') !== 'marketing' && !sessionStorage.getItem('mkt_logged_in')){
    // Check if coming from main login
    if(localStorage.getItem('hs_role') !== 'marketing'){
      // Will be handled by internal login form below
    }
  }
  // ── CREDENTIALS ──────────────────────────────────────────────
  var MKT_USERS = [
    { username: 'marketing', password: 'ogmarketing2025' },
    { username: 'marketing', password: 'mkt@2025' },
    { username: 'mktteam',   password: 'ogshoots@mkt' }
  ];

  var FB_CFG = {apiKey:'AIzaSyAtkcHfgNx9xEcyMC50eRX5VPv1r7O5XyE',authDomain:'hash-shoots.firebaseapp.com',projectId:'hash-shoots',storageBucket:'hash-shoots.firebasestorage.app',messagingSenderId:'1093054616221',appId:'1:1093054616221:web:55bdebafc895acfd04fa74'};

  // ── AUTH ─────────────────────────────────────────────────────
  function mktLogin(){
    var u = document.getElementById('mktUser').value.trim().toLowerCase();
    var p = document.getElementById('mktPass').value.trim();
    var errEl = document.getElementById('loginErr');
    if(!u || !p){ errEl.style.display='block'; errEl.textContent='Please enter username and password.'; return; }
    var match = MKT_USERS.find(function(x){ return x.username === u && x.password === p; });
    if(!match){ errEl.style.display='block'; errEl.textContent='Invalid credentials. Try: marketing / ogmarketing2025'; return; }
    errEl.style.display='none';
    localStorage.setItem('hs_mkt_logged','1');
    localStorage.setItem('hs_mkt_user', u);
    localStorage.setItem('hs_role','marketing');
    showPortal();
  }

  function mktLogout(){
    localStorage.removeItem('hs_mkt_logged');
    document.getElementById('portal').style.display='none';
    document.getElementById('loginWrap').style.display='flex';
  }

  function showPortal(){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('portal').style.display='block';
    loadAll();
    loadLocalTabs();
  }

  // Check if already logged in (own login or via main login page)
  document.addEventListener('DOMContentLoaded', function(){
    if(localStorage.getItem('hs_mkt_logged')==='1' || localStorage.getItem('hs_role')==='marketing'){
      localStorage.setItem('hs_mkt_logged','1');
      document.getElementById('loginWrap').style.display='none';
      document.getElementById('portal').style.display='block';
      loadAll();
      loadLocalTabs();
    } else {
      document.getElementById('loginWrap').style.display='flex';
      document.getElementById('portal').style.display='none';
    }
  });

  // ── TAB SWITCH ───────────────────────────────────────────────
  function switchMktTab(name, btn){
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('panel-'+name).classList.add('active');
    if(btn) btn.classList.add('active');
    if(name==='leads') renderLeads();
    if(name==='meetings') renderMeetings();
    if(name==='invitations') renderInvitations();
    if(name==='profile') loadMktProfile();
    if(name==='bank') loadMktBank();
  }

  // ── FIREBASE ─────────────────────────────────────────────────
  var _fbApp = null, _fbDb = null, _fbStore = null;
  async function getFirebase(){
    if(_fbDb) return {db:_fbDb, s:_fbStore};
    var fbMod   = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    var fbStore = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    _fbApp   = fbMod.getApps().find(function(a){return a.name==='mkt-portal';})||fbMod.initializeApp(FB_CFG,'mkt-portal');
    _fbDb    = fbStore.getFirestore(_fbApp);
    _fbStore = fbStore;
    return {db:_fbDb, s:_fbStore};
  }

  // ── LOAD ALL DATA ────────────────────────────────────────────
  async function loadAll(){
    var f = await getFirebase();
    var s = f.s;
    s.onSnapshot(s.collection(f.db,'enquiries'), function(snap){
      _svc = []; _biz = [];
      snap.forEach(function(d){
        var data = d.data(); var t = (data.type||'general').toLowerCase();
        if(t==='business') _biz.push(Object.assign({id:d.id},data));
        else if(t==='general'||!data.type) _svc.push(Object.assign({id:d.id},data));
      });
      _svc.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });
      _biz.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });
      renderServiceEnquiries(); renderBizEnquiries(); renderDashboard();
    });
    s.onSnapshot(s.collection(f.db,'marketing_enquiries'), function(snap){
      _mkt = [];
      snap.forEach(function(d){ _mkt.push(Object.assign({id:d.id},d.data())); });
      _mkt.sort(function(a,b){ return (b.submittedAt&&b.submittedAt.seconds||0)-(a.submittedAt&&a.submittedAt.seconds||0); });
      renderMktEnquiries(); renderDashboard();
    });
  }

  var _svc=[], _mkt=[], _biz=[];

  async function loadServiceEnquiries(){
    try{
      var f = await getFirebase();
      var snap = await f.s.getDocs(f.s.collection(f.db,'enquiries'));
      _svc = [];
      snap.forEach(function(d){
        var data = d.data();
        var t = (data.type||'general').toLowerCase();
        if(t==='general'||t==='business'||!data.type) _svc.push(Object.assign({id:d.id},data));
      });
      _svc.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });
      renderServiceEnquiries();
    }catch(e){ console.warn(e); }
  }

  async function loadMktEnquiries(){
    try{
      var f = await getFirebase();
      var snap = await f.s.getDocs(f.s.collection(f.db,'marketing_enquiries'));
      _mkt = [];
      snap.forEach(function(d){ _mkt.push(Object.assign({id:d.id},d.data())); });
      _mkt.sort(function(a,b){ return (b.submittedAt&&b.submittedAt.seconds||0)-(a.submittedAt&&a.submittedAt.seconds||0); });
      renderMktEnquiries();
    }catch(e){ console.warn(e); }
  }

  async function loadBizEnquiries(){
    try{
      var f = await getFirebase();
      var snap = await f.s.getDocs(f.s.collection(f.db,'enquiries'));
      _biz = [];
      snap.forEach(function(d){
        var data = d.data();
        if((data.type||'').toLowerCase()==='business') _biz.push(Object.assign({id:d.id},data));

  // ── RENDER DASHBOARD ─────────────────────────────────────────
  function renderDashboard(){
    var statsEl = document.getElementById('statsRow');
    statsEl.innerHTML =
      stat(_svc.length, 'Service Enquiries', '#c9a84c') +
      stat(_mkt.length, 'Marketing Enquiries', '#2196f3') +
      stat(_biz.length, 'Business Enquiries', '#9c27b0') +
      stat([..._svc,..._mkt,..._biz].filter(function(e){ return e.status==='done'; }).length, 'Closed Leads', '#f44336');

    // Recent 5 from all enquiries
    var all = [].concat(
      _svc.map(function(e){ return Object.assign({_src:'Service'},e); }),
      _mkt.map(function(e){ return Object.assign({_src:'Marketing'},e); }),
      _biz.map(function(e){ return Object.assign({_src:'Business'},e); })
    ).slice(0,8);

    var recentEl = document.getElementById('recentList');
    if(!all.length){ recentEl.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i>No enquiries yet.</div>'; return; }
    recentEl.innerHTML = all.map(function(e){
      var srcColor = e._src==='Marketing'?'#2196f3':e._src==='Business'?'#9c27b0':'#c9a84c';
      return '<div class="card" style="border-left:3px solid '+srcColor+';">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;">'+
        '<div><div class="card-title">'+(e.name||'—')+'</div>'+
        '<div class="card-meta">'+(e.phone||e.email||'')+'</div></div>'+
        '<span class="badge-type" style="background:'+srcColor+'22;border:1px solid '+srcColor+'44;color:'+srcColor+';">'+e._src+'</span>'+
        '</div>'+
        (e.message?'<div class="card-msg">'+e.message+'</div>':'')+
        '<div style="font-size:0.65rem;color:#777;">'+formatTs(e.createdAt||e.submittedAt)+'</div>'+
        '</div>';
    }).join('');
  }

  function enquiryCard(e, collection){
    var isDone = e.status==='done';

    var actions = isDone
      ? '<span class="badge-done"><i class="fas fa-check-double"></i> Done</span>'
      : (isAccepted
        ? '<span class="badge-accepted"><i class="fas fa-check"></i> Accepted</span> <button class="btn-done" onclick="markDone(\''+e.id+'\',\''+collection+'\')"><i class="fas fa-check-double"></i> Mark Done</button>'
        : '<button class="btn-accept" onclick="acceptEnq(\''+e.id+'\',\''+collection+'\')"><i class="fas fa-check"></i> Accept</button> <button class="btn-done" onclick="markDone(\''+e.id+'\',\''+collection+'\')"><i class="fas fa-check-double"></i> Mark Done</button>');
    return '<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.6rem;">'+
      '<div><div class="card-title">'+(e.name||'—')+'</div>'+
      '<div class="card-meta">'+(e.phone||'')+(e.email?' · '+e.email:'')+(e.brand?' · '+e.brand:'')+'</div></div>'+
      '<div style="display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center;">'+actions+'</div>'+
      '</div>'+
      (e.plan&&e.plan!=='Not selected'?'<div style="margin-bottom:0.5rem;"><span style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:#c9a84c;font-size:0.65rem;font-weight:800;padding:0.15rem 0.55rem;border-radius:50px;">'+e.plan+' Plan</span></div>':'')+

      '<div style="font-size:0.65rem;color:#777;">'+formatTs(e.createdAt||e.submittedAt)+'</div>'+
      '</div>';
  }

  function openAddLead(){
    var name = prompt('Lead Name *'); if(!name) return;
    var phone = prompt('Phone Number');

  function updateLeadStatus(id, status){
    var leads = JSON.parse(localStorage.getItem('mkt_leads')||'[]');
    leads = leads.map(function(l){ return l.id===id ? Object.assign({},l,{status:status}) : l; });
    localStorage.setItem('mkt_leads', JSON.stringify(leads));
    saveMktLeadToFirebase(leads.find(function(l){ return l.id===id; }));
    renderLeads();
  }

    var leads = JSON.parse(localStorage.getItem('mkt_leads')||'[]').filter(function(l){ return l.id!==id; });

      if(leads.length) localStorage.setItem('mkt_leads',JSON.stringify(leads));
      // Meetings
      var mSnap = await f.s.getDocs(f.s.collection(f.db,'mkt_meetings'));
      var meetings=[]; mSnap.forEach(function(d){ meetings.push(d.data()); });
      if(meetings.length) localStorage.setItem('mkt_meetings',JSON.stringify(meetings));
      // Invitations
      var iSnap = await f.s.getDocs(f.s.collection(f.db,'mkt_invitations'));
      var invites=[]; iSnap.forEach(function(d){ invites.push(d.data()); });
      if(invites.length) localStorage.setItem('mkt_invitations',JSON.stringify(invites));
    }catch(e){}
    renderLeads(); renderMeetings(); renderInvitations();
  }

  // ── HELPERS ───────────────────────────────────────────────────
  function formatTs(ts){
    if(!ts) return '';
    if(ts && ts.seconds) return new Date(ts.seconds*1000).toLocaleString();
    return String(ts);
  }
</script>
