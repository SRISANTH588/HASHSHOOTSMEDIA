<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Wallet - OG SHOOTS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>

  :root{
    --gold:#c9a84c;--gold-dark:#a07830;--gold-light:#e8c96a;
    --bg:#080808;--bg2:#0f0f0f;--bg3:#141414;
    --card:#1a1a1a;--card2:#1e1e1e;
    --border:rgba(201,168,76,0.12);
    --text:#f0ece0;--muted:#9a9080;
  }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#f0ece0;min-height:100vh;}
    nav{background:rgba(10,10,10,0.97);border-bottom:1px solid rgba(201,168,76,0.15);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .logo{font-size:1.4rem;font-weight:900;}.logo span{color:var(--gold);}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-right span{color:var(--muted);font-size:0.875rem;}
    .btn{background:transparent;border:1px solid rgba(201,168,76,0.15);color:var(--text);padding:0.4rem 1rem;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.85rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;transition:all 0.2s;}
    .btn:hover{border-color:var(--gold);color:var(--gold);}
    .tab-bar{background:var(--bg);border-bottom:1px solid rgba(201,168,76,0.06);display:flex;overflow-x:auto;scrollbar-width:none;}
    .ctab{padding:0.85rem 1.2rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:0.45rem;text-decoration:none;transition:all 0.2s;}
    .ctab:hover{color:var(--text);}
    .ctab.active{color:var(--gold);border-bottom-color:var(--gold);}
    .container{max-width:600px;margin:3rem auto;padding:0 1.5rem;}
    .page-title{font-size:1.8rem;font-weight:900;margin-bottom:0.4rem;}
    .page-title span{color:var(--gold);}
    .subtitle{color:var(--muted);margin-bottom:2rem;font-size:0.9rem;}
  </style>
</head>
<body>
  <nav>
    <div class="logo"><span style="color:#c9a84c;">OG</span> SHOOTS <sup style="font-size:0.45em;font-weight:700;color:#c9a84c;letter-spacing:2px;vertical-align:super;opacity:0.85;">LUXE</sup></div>
    <div class="nav-right">
      <span id="welcomeMsg">Welcome, Customer</span>
      <a href="customer.html" class="btn"><i class="fas fa-arrow-left"></i> Back</a>
      <button class="btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>


  <div class="container">
    <h1 class="page-title">My <span>Wallet</span></h1>
    <p class="subtitle">Your cashback and rewards balance</p>

    <div style="background:#1a1a1a;border:1px solid rgba(201,168,76,0.12);border-radius:18px;padding:2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;">
      <div>
        <div style="font-size:0.78rem;color:#9a9080;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;">Available Balance</div>
        <div style="font-size:2.5rem;font-weight:900;color:#fff;">&#8377;<span id="walletBal">0</span></div>
        <div style="font-size:0.78rem;color:#6a5a40;margin-top:0.3rem;">Use wallet balance on your next booking</div>
      </div>
      <div style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:1rem 1.5rem;text-align:center;">
        <i class="fas fa-wallet" style="font-size:2rem;color:#c9a84c;display:block;margin-bottom:0.5rem;"></i>
        <div style="font-size:0.78rem;color:#9a9080;">Cashback &amp; Rewards</div>
      </div>
    </div>

    <div style="margin-top:1.5rem;background:#111111;border:1px solid rgba(201,168,76,0.06);border-radius:14px;padding:1.5rem;">
      <div style="font-size:0.85rem;font-weight:700;margin-bottom:1rem;color:#9a9080;">Transaction History</div>
      <div id="txList" style="color:#9a9080;font-size:0.85rem;text-align:center;padding:1.5rem 0;">No transactions yet.</div>
    </div>
  </div>

  <script>
    if(localStorage.getItem('hs_role') !== 'customer') window.location.href = 'login.html';
    const user = localStorage.getItem('hs_customer_name') || localStorage.getItem('hs_user') || 'Customer';
    document.getElementById('welcomeMsg').textContent = 'Welcome, ' + user;
    // Get wallet by phone (set by admin per booking phone)
    var bookings = JSON.parse(localStorage.getItem('hs_bookings') || '[]');
    var myBooking = bookings.find(function(b){ return b.name === user; });
    var phone = myBooking ? myBooking.phone : '';
    var bal = phone ? (localStorage.getItem('hs_cw_' + phone) || '0') : '0';
    document.getElementById('walletBal').textContent = bal;
    function logout(){ localStorage.removeItem('hs_role'); window.location.href = 'login.html'; }
  </script>
</body>
</html>
