<!DOCTYPE html>
<html>
<head><title>Clear Testimonials</title></head>
<body style="font-family:sans-serif;padding:2rem;background:#111;color:#fff;">
<h2>Clear All Testimonials</h2>
<button id="btn" onclick="run()" style="background:#f44336;color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;font-size:1rem;cursor:pointer;">Delete All Testimonials</button>
<p id="status" style="margin-top:1rem;color:#9a9080;"></p>
<script type="module">
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  const fc={apiKey:'AIzaSyAtkcHfgNx9xEcyMC50eRX5VPv1r7O5XyE',authDomain:'hash-shoots.firebaseapp.com',projectId:'hash-shoots',storageBucket:'hash-shoots.firebasestorage.app',messagingSenderId:'1093054616221',appId:'1:1093054616221:web:55bdebafc895acfd04fa74'};
  const app=getApps().find(a=>a.name==='clr')||initializeApp(fc,'clr');
  const db=getFirestore(app);

  window.run = async function(){
    if(!confirm('Delete ALL testimonials from Firebase?')) return;
    document.getElementById('status').textContent='Deleting...';
    document.getElementById('btn').disabled=true;
    try{
      const snap=await getDocs(collection(db,'homepage_testimonials'));
      let count=0;
      for(const d of snap.docs){
        await deleteDoc(doc(db,'homepage_testimonials',d.id));
        count++;
        document.getElementById('status').textContent='Deleted '+count+' so far...';
      }
      document.getElementById('status').textContent='✅ Done! Deleted '+count+' testimonial(s). You can close this tab.';
      document.getElementById('status').style.color='#4caf50';
    }catch(e){
      document.getElementById('status').textContent='❌ Error: '+e.message;
      document.getElementById('status').style.color='#f44336';
      document.getElementById('btn').disabled=false;
    }
  };
</script>
</body>
</html>
