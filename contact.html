<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contact Us — Hash Shoots</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a0a;font-family:'Inter',sans-serif;min-height:100vh;}

    .ct-page{padding:6rem 2rem 5rem;max-width:1200px;margin:0 auto;}

    .ct-header{text-align:center;margin-bottom:3.5rem;}
    .ct-h1{font-size:clamp(2.4rem,6vw,4rem);font-weight:900;color:#fff;line-height:1.1;}
    .ct-h1 span{color:#c9a84c;}
    .ct-sub{color:#706050;font-size:1rem;margin-top:0.8rem;}

    .ct-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:1.5rem;align-items:start;}

    /* LEFT INFO CARD */
    .ct-info{background:#0f0f0f;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:2.2rem;}
    .ct-info-item{display:flex;align-items:flex-start;gap:1.1rem;padding:1.3rem 0;border-bottom:1px solid rgba(255,255,255,0.05);}
    .ct-info-item:last-child{border-bottom:none;padding-bottom:0;}
    .ct-info-item:first-child{padding-top:0;}
    .ct-info-icon{width:44px;height:44px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#c9a84c;font-size:1rem;flex-shrink:0;}
    .ct-info-label{font-size:1rem;font-weight:700;color:#fff;margin-bottom:0.35rem;}
    .ct-info-val{font-size:0.88rem;color:#706050;line-height:1.7;}

    /* RIGHT FORM CARD */
    .ct-form-card{background:#0f0f0f;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:2.2rem;}
    .ct-field{margin-bottom:1.3rem;}
    .ct-label{display:block;font-size:0.88rem;font-weight:600;color:#ccc;margin-bottom:0.55rem;}
    .ct-input,.ct-textarea{width:100%;background:#2a0505;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:0.85rem 1.1rem;font-size:0.92rem;color:#fff;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
    .ct-input:focus,.ct-textarea:focus{border-color:rgba(201,168,76,0.5);}
    .ct-textarea{resize:vertical;min-height:130px;}
    .ct-phone-wrap{display:flex;gap:0.6rem;}
    .ct-phone-code{display:flex;align-items:center;gap:0.4rem;background:#2a0505;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:0.85rem 1rem;font-size:0.88rem;color:#ccc;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .ct-phone-code select{background:transparent;border:none;color:#ccc;font-family:'Inter',sans-serif;font-size:0.88rem;outline:none;cursor:pointer;}
    .ct-phone-code select option{background:#2a0505;}
    .ct-input.phone-num{flex:1;}
    .ct-submit{width:100%;background:linear-gradient(135deg,#c9a84c,#a07830);border:none;border-radius:14px;padding:1rem;font-size:1rem;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:opacity 0.2s,transform 0.2s;margin-top:0.5rem;}
    .ct-submit:hover{opacity:0.9;transform:translateY(-2px);}

    .ct-success{display:none;text-align:center;padding:2rem;color:#4caf50;font-size:1rem;font-weight:600;}
    .ct-success i{font-size:2.5rem;display:block;margin-bottom:0.75rem;}

    @media(max-width:820px){.ct-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<script src="nav.js"></script>

<div class="ct-page">
  <div class="ct-header">
    <h1 class="ct-h1">Get in <span>Touch</span></h1>
    <p class="ct-sub">Have questions? We're here to help you create amazing content.</p>
  </div>

  <div class="ct-grid">

    <!-- INFO -->
    <div class="ct-info">
      <div class="ct-info-item">
        <div class="ct-info-icon"><i class="fas fa-map-marker-alt"></i></div>
        <div>
          <div class="ct-info-label">Our Location</div>
          <div class="ct-info-val">Vijayawada, India</div>
        </div>
      </div>
      <div class="ct-info-item">
        <div class="ct-info-icon"><i class="fas fa-clock"></i></div>
        <div>
          <div class="ct-info-label">Business Hours</div>
          <div class="ct-info-val">Monday - Sunday<br/>9:00 AM - 9:00 PM</div>
        </div>
      </div>
      <div class="ct-info-item">
        <div class="ct-info-icon"><i class="fas fa-phone-alt"></i></div>
        <div>
          <div class="ct-info-label">Phone</div>
          <div class="ct-info-val">+91 6304279351</div>
        </div>
      </div>
      <div class="ct-info-item">
        <div class="ct-info-icon"><i class="fas fa-envelope"></i></div>
        <div>
          <div class="ct-info-label">Email</div>
          <div class="ct-info-val">hashshootsmedia@gmail.com</div>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="ct-form-card">
      <form id="ctForm" onsubmit="submitContact(event)">
        <div class="ct-field">
          <label class="ct-label">Name</label>
          <input class="ct-input" type="text" placeholder="" required/>
        </div>
        <div class="ct-field">
          <label class="ct-label">Email</label>
          <input class="ct-input" type="email" placeholder="" required/>
        </div>
        <div class="ct-field">
          <label class="ct-label">Phone Number</label>
          <div class="ct-phone-wrap">
            <div class="ct-phone-code">
              🇮🇳
              <select>
                <option>+91</option>
                <option>+1</option>
                <option>+44</option>
                <option>+61</option>
                <option>+971</option>
              </select>
            </div>
            <input class="ct-input phone-num" type="tel" placeholder="Enter phone number"/>
          </div>
        </div>
        <div class="ct-field">
          <label class="ct-label">Message</label>
          <textarea class="ct-textarea" required></textarea>
        </div>
        <button type="submit" class="ct-submit">Send Message <i class="fas fa-arrow-right"></i></button>
      </form>
      <div class="ct-success" id="ctSuccess">
        <i class="fas fa-check-circle"></i>
        Message sent! We'll get back to you shortly.
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  var fbCfg = {
    apiKey:'AIzaSyAtkcHfgNx9xEcyMC50eRX5VPv1r7O5XyE',
    authDomain:'hash-shoots.firebaseapp.com',
    projectId:'hash-shoots',
    storageBucket:'hash-shoots.firebasestorage.app',
    messagingSenderId:'1093054616221',
    appId:'1:1093054616221:web:55bdebafc895acfd04fa74'
  };
  var existing = getApps().find(function(a){ return a.name==='contact-app'; });
  var fbApp = existing || initializeApp(fbCfg, 'contact-app');
  var fbDb = getFirestore(fbApp);

  window.submitContact = async function(e){
    e.preventDefault();
    var form = document.getElementById('ctForm');
    var inputs = form.querySelectorAll('input, textarea');
    var name    = inputs[0].value.trim();
    var email   = inputs[1].value.trim();
    var phone   = form.querySelector('.phone-num').value.trim();
    var message = form.querySelector('textarea').value.trim();

    // Save to Firebase Firestore
    try {
      await addDoc(collection(fbDb, 'enquiries'), {
        name: name,
        email: email,
        phone: phone || 'N/A',
        message: message,
        createdAt: serverTimestamp()
      });
    } catch(err) {
      console.error('Firebase write error:', err);
    }

    // Also save to localStorage as backup
    var enquiries = JSON.parse(localStorage.getItem('hs_enquiries') || '[]');
    enquiries.push({
      id: Date.now(),
      name: name,
      email: email,
      phone: phone || 'N/A',
      message: message,
      submittedAt: new Date().toLocaleString()
    });
    localStorage.setItem('hs_enquiries', JSON.stringify(enquiries));

    // Also save to customer orders if logged in
    var role = localStorage.getItem('hs_role');
    if(role === 'customer'){
      var custEmail = localStorage.getItem('hs_user') || email;
      var orders = JSON.parse(localStorage.getItem('hs_customer_enquiries_' + custEmail) || '[]');
      orders.push({
        id: Date.now(),
        type: 'enquiry',
        name: name,
        email: email,
        phone: phone || 'N/A',
        message: message,
        status: 'pending',
        submittedAt: new Date().toLocaleString()
      });
      localStorage.setItem('hs_customer_enquiries_' + custEmail, JSON.stringify(orders));
    }

    document.getElementById('ctForm').style.display='none';
    document.getElementById('ctSuccess').style.display='block';
  }
</script>
</body>
</html>
