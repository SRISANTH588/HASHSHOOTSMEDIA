<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><title>Vibe Debug</title></head>
<body style="background:#000;color:#fff;font-family:monospace;padding:2rem;">
<h2>Vibe Items Debug</h2>
<div id="out">Loading...</div>
<script>
fetch('https://firestore.googleapis.com/v1/projects/hash-shoots/databases/(default)/documents/vibe_items?key=AIzaSyAtkcHfgNx9xEcyMC50eRX5VPv1r7O5XyE')
  .then(function(r){ return r.json(); })
  .then(function(data){
    var docs = data.documents || [];
    var out = document.getElementById('out');
    out.innerHTML = '<p>Total: ' + docs.length + '</p>';
    docs.forEach(function(d){
      var f = d.fields;
      var title = f.title ? f.title.stringValue : 'no title';
      var url   = f.url   ? f.url.stringValue   : 'no url';
      var thumb = f.thumbnail ? f.thumbnail.stringValue : 'no thumb';
      out.innerHTML += '<hr><p><b>' + title + '</b></p>'
        + '<p>URL: <a href="'+url+'" target="_blank" style="color:#c9a84c;">'+url.slice(0,80)+'</a></p>'
        + '<p>Thumb: <a href="'+thumb+'" target="_blank" style="color:#4caf50;">'+thumb.slice(0,80)+'</a></p>'
        + '<img src="'+thumb+'" style="width:150px;border:1px solid #c9a84c;margin-top:0.5rem;" onerror="this.style.border=\'2px solid red\';this.alt=\'FAILED\'"/>';
    });
  })
  .catch(function(e){ document.getElementById('out').textContent = 'ERROR: ' + e.message; });
</script>
</body>
</html>
