<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile - OG SHOOTS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>

  :root{
    --gold:#c9a84c;--gold-dark:#a07830;--gold-light:#e8c96a;
    --bg:#080808;--bg2:#0f0f0f;--bg3:#141414;
    --card:#1a1a1a;--card2:#1e1e1e;
    --border:rgba(201,168,76,0.12);
    --text:#f0ece0;--muted:#9a9080;
  }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#f0ece0;min-height:100vh;}
    nav{background:rgba(10,10,10,0.97);border-bottom:1px solid rgba(201,168,76,0.15);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .logo{font-size:1.4rem;font-weight:900;}.logo span{color:var(--gold);}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-right span{color:var(--muted);font-size:0.875rem;}
    .btn{background:transparent;border:1px solid rgba(201,168,76,0.15);color:var(--text);padding:0.4rem 1rem;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.85rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;transition:all 0.2s;}
    .btn:hover{border-color:var(--gold);color:var(--gold);}
    .tab-bar{background:var(--bg);border-bottom:1px solid rgba(201,168,76,0.06);display:flex;overflow-x:auto;scrollbar-width:none;}
    .ctab{padding:0.85rem 1.2rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:0.45rem;text-decoration:none;transition:all 0.2s;}
    .ctab:hover{color:var(--text);}
    .ctab.active{color:var(--gold);border-bottom-color:var(--gold);}
    .container{max-width:600px;margin:3rem auto;padding:0 1.5rem;}
    .page-title{font-size:1.8rem;font-weight:900;margin-bottom:0.4rem;}
    .page-title span{color:var(--gold);}
    .subtitle{color:var(--muted);margin-bottom:2rem;font-size:0.9rem;}
    input{background:var(--bg2);border:1px solid rgba(201,168,76,0.15);border-radius:10px;padding:0.8rem 1rem;color:var(--text);font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.2s;width:100%;}
    input:focus{border-color:var(--gold);}
    label{font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:0.4rem;}
  </style>
</head>
<body>
  <nav>
    <div class="logo"><span style="color:#c9a84c;">OG</span> SHOOTS <sup style="font-size:0.45em;font-weight:700;color:#c9a84c;letter-spacing:2px;vertical-align:super;">LUXE</sup></div>
    <div class="nav-right">
      <span id="welcomeMsg">Welcome, Customer</span>
      <a href="customer.html" class="btn"><i class="fas fa-arrow-left"></i> Back</a>
      <button class="btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>


  <div class="container">
    <h1 class="page-title">My <span>Profile</span></h1>
    <p class="subtitle">Manage your account details</p>

    <div style="background:#1a1a1a;border:1px solid rgba(201,168,76,0.12);border-radius:18px;padding:2rem;">
      <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem;">
        <div style="position:relative;flex-shrink:0;">
          <div id="profileAv" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#c9a84c,#a07830);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:900;color:#fff;overflow:hidden;"></div>
          <label for="profilePicInput" style="position:absolute;bottom:0;right:0;width:26px;height:26px;background:#c9a84c;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #1a1a1a;">
            <i class="fas fa-camera" style="font-size:0.65rem;color:#fff;"></i>
          </label>
          <input type="file" id="profilePicInput" accept="image/*" style="display:none;" onchange="uploadProfilePic(this)"/>
        </div>
        <div>
          <div id="profileName" style="font-size:1.15rem;font-weight:800;color:#fff;"></div>
          <div style="font-size:0.78rem;color:#c9a84c;font-weight:600;margin-top:0.2rem;">Customer Account</div>
          <div style="font-size:0.72rem;color:#9a9080;margin-top:0.2rem;">Tap camera icon to change photo</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem;">
        <div>
          <label><i class="fas fa-user" style="color:#c9a84c;"></i> Full Name</label>
          <input type="text" id="editName" placeholder="Your name"/>
        </div>
        <div>
          <label><i class="fas fa-phone" style="color:#c9a84c;"></i> Phone</label>
          <input type="tel" id="editPhone" placeholder="+91 XXXXX XXXXX"/>
        </div>
        <div style="grid-column:span 2;">
          <label><i class="fas fa-envelope" style="color:#c9a84c;"></i> Email</label>
          <input type="text" id="profileEmail" readonly style="background:#0f0f0f;border-color:rgba(201,168,76,0.05);color:#9a9080;cursor:not-allowed;"/>
        </div>
      </div>

      <button onclick="saveProfile()" style="background:#c9a84c;color:#fff;border:none;border-radius:10px;padding:0.75rem 2rem;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:0.5rem;">
        <i class="fas fa-save"></i> Save Profile
      </button>
      <div id="saveMsg" style="display:none;margin-top:0.75rem;background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.3);color:#4caf50;border-radius:8px;padding:0.5rem 1rem;font-size:0.82rem;font-weight:600;">
        <i class="fas fa-check-circle"></i> Profile saved!
      </div>
    </div>
  </div>

  <script>
    if(localStorage.getItem('hs_role') !== 'customer') window.location.href = 'login.html';
    const user = localStorage.getItem('hs_customer_name') || localStorage.getItem('hs_user') || 'Customer';
    const userEmail = localStorage.getItem('hs_user') || '';
    document.getElementById('welcomeMsg').textContent = 'Welcome, ' + user;

    function loadProfile(){
      var prof = JSON.parse(localStorage.getItem('hs_customer_profile') || '{}');
      var name = prof.name || user;
      document.getElementById('editName').value = name;
      document.getElementById('editPhone').value = prof.phone || '';
      document.getElementById('profileEmail').value = userEmail || '—';
      document.getElementById('profileName').textContent = name;
      var initials = name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
      var av = document.getElementById('profileAv');
      if(prof.pic){ av.innerHTML = '<img src="'+prof.pic+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>'; }
      else { av.textContent = initials; }
    }
    loadProfile();

    function uploadProfilePic(input){
      var file = input.files[0]; if(!file) return;
      var reader = new FileReader();
      reader.onload = function(e){
        var prof = JSON.parse(localStorage.getItem('hs_customer_profile') || '{}');
        prof.pic = e.target.result;
        localStorage.setItem('hs_customer_profile', JSON.stringify(prof));
        loadProfile();
      };
      reader.readAsDataURL(file);
    }

    function saveProfile(){
      var name = document.getElementById('editName').value.trim();
      var phone = document.getElementById('editPhone').value.trim();
      if(!name){ alert('Please enter your name.'); return; }
      var prof = JSON.parse(localStorage.getItem('hs_customer_profile') || '{}');
      prof.name = name; prof.phone = phone;
      localStorage.setItem('hs_customer_profile', JSON.stringify(prof));
      localStorage.setItem('hs_customer_name', name);
      document.getElementById('profileName').textContent = name;
      document.getElementById('welcomeMsg').textContent = 'Welcome, ' + name;
      var msg = document.getElementById('saveMsg');
      msg.style.display = 'block';
      setTimeout(function(){ msg.style.display = 'none'; }, 3000);
    }

    function logout(){ localStorage.removeItem('hs_role'); window.location.href = 'login.html'; }
  </script>
</body>
</html>
