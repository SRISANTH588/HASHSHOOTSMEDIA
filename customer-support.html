<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Support - X SHOOTS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;}
    nav{background:rgba(10,10,10,0.97);border-bottom:1px solid rgba(201,168,76,0.15);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .logo{font-size:1.4rem;font-weight:900;}.logo span{color:#c9a84c;}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-right span{color:#888070;font-size:0.875rem;}
    .btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:0.4rem 1rem;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.85rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;transition:all 0.2s;}
    .btn:hover{border-color:#c9a84c;color:#c9a84c;}
    .tab-bar{background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;overflow-x:auto;scrollbar-width:none;}
    .ctab{padding:0.85rem 1.2rem;background:none;border:none;border-bottom:2px solid transparent;color:#888070;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:0.45rem;text-decoration:none;transition:all 0.2s;}
    .ctab:hover{color:#fff;}
    .ctab.active{color:#c9a84c;border-bottom-color:#c9a84c;}
    .container{max-width:600px;margin:3rem auto;padding:0 1.5rem;}
    .page-title{font-size:1.8rem;font-weight:900;margin-bottom:0.4rem;}
    .page-title span{color:#c9a84c;}
    .subtitle{color:#888070;margin-bottom:2rem;font-size:0.9rem;}
    .card{background:#1a1a1a;border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:2rem;margin-bottom:1.25rem;}
    input,textarea,select{background:#0f0f0f;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:0.8rem 1rem;color:#fff;font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.2s;width:100%;}
    input:focus,textarea:focus,select:focus{border-color:#c9a84c;}
    label{font-size:0.78rem;color:#888070;font-weight:600;display:block;margin-bottom:0.4rem;}
    .form-group{margin-bottom:1rem;}
    textarea{resize:vertical;min-height:100px;}
    select option{background:#141414;}
  </style>
<script type="module" src="hs-firebase.js"></script>
</head>
<body>
  <nav>
    <div class="logo"><span style="color:#c9a84c;">X</span> SHOOTS <sup style="font-size:0.45em;font-weight:700;color:#c9a84c;letter-spacing:2px;vertical-align:super;">LUXE</sup></div>
    <div class="nav-right">
      <span id="welcomeMsg">Welcome, Customer</span>
      <a href="customer.html" class="btn"><i class="fas fa-arrow-left"></i> Back</a>
      <button class="btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>


  <div class="container">
    <h1 class="page-title">Customer <span>Support</span></h1>
    <p class="subtitle">We're here to help. Send us your query.</p>

    <!-- Contact options -->
    <div class="card" style="display:flex;gap:1rem;flex-wrap:wrap;">
      <a href="tel:+916304279351" style="flex:1;min-width:140px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:1.25rem;text-align:center;text-decoration:none;color:#fff;transition:all 0.2s;">
        <i class="fas fa-phone" style="font-size:1.5rem;color:#c9a84c;display:block;margin-bottom:0.5rem;"></i>
        <div style="font-size:0.85rem;font-weight:700;">Call Us</div>
        <div style="font-size:0.75rem;color:#888070;margin-top:0.2rem;">+91 63042 79351</div>
      </a>
      <a href="https://wa.me/916304279351" target="_blank" style="flex:1;min-width:140px;background:rgba(37,211,102,0.08);border:1px solid rgba(37,211,102,0.2);border-radius:12px;padding:1.25rem;text-align:center;text-decoration:none;color:#fff;transition:all 0.2s;">
        <i class="fab fa-whatsapp" style="font-size:1.5rem;color:#25d366;display:block;margin-bottom:0.5rem;"></i>
        <div style="font-size:0.85rem;font-weight:700;">WhatsApp</div>
        <div style="font-size:0.75rem;color:#888070;margin-top:0.2rem;">Chat with us</div>
      </a>
      <a href="mailto:support@ogshoots.com" style="flex:1;min-width:140px;background:rgba(33,150,243,0.08);border:1px solid rgba(33,150,243,0.2);border-radius:12px;padding:1.25rem;text-align:center;text-decoration:none;color:#fff;transition:all 0.2s;">
        <i class="fas fa-envelope" style="font-size:1.5rem;color:#2196f3;display:block;margin-bottom:0.5rem;"></i>
        <div style="font-size:0.85rem;font-weight:700;">Email</div>
        <div style="font-size:0.75rem;color:#888070;margin-top:0.2rem;">support@ogshoots.com</div>
      </a>
      <button onclick="openTawkChat()" style="flex:1;min-width:140px;background:rgba(103,58,183,0.08);border:1px solid rgba(103,58,183,0.2);border-radius:12px;padding:1.25rem;text-align:center;color:#fff;cursor:pointer;font-family:inherit;transition:all 0.2s;">
        <i class="fas fa-comments" style="font-size:1.5rem;color:#7c4dff;display:block;margin-bottom:0.5rem;"></i>
        <div style="font-size:0.85rem;font-weight:700;">Live Chat</div>
        <div style="font-size:0.75rem;color:#888070;margin-top:0.2rem;">Chat with us now</div>
      </button>
    </div>

    <!-- Support form -->
    <div class="card">
      <div style="font-size:1rem;font-weight:800;margin-bottom:1.25rem;">Send a Message</div>
      <div class="form-group">
        <label>Issue Type</label>
        <select id="issueType">
          <option value="">Select issue</option>
          <option>Booking related</option>
          <option>Payment / Wallet</option>
          <option>Creator issue</option>
          <option>Rescheduling</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="issueMsg" placeholder="Describe your issue..."></textarea>
      </div>
      <button onclick="submitSupport()" style="background:#c9a84c;color:#fff;border:none;border-radius:10px;padding:0.75rem 2rem;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:0.5rem;">
        <i class="fas fa-paper-plane"></i> Submit
      </button>
      <div id="supportMsg" style="display:none;margin-top:0.75rem;background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.3);color:#4caf50;border-radius:8px;padding:0.5rem 1rem;font-size:0.82rem;font-weight:600;">
        <i class="fas fa-check-circle"></i> Message sent! We'll get back to you soon.
      </div>
    </div>
  </div>

  <script>
    // ===== TAWK.TO — loaded from admin config =====
    (function(){
      var cfg = JSON.parse(localStorage.getItem('hs_tawk_config') || '{}');
      if(cfg.propertyId && cfg.widgetId){
        var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
        var s1 = document.createElement('script'), s0 = document.getElementsByTagName('script')[0];
        s1.async = true;
        s1.src = 'https://embed.tawk.to/' + cfg.propertyId + '/' + cfg.widgetId;
        s1.charset = 'UTF-8';
        s1.setAttribute('crossorigin', '*');
        s0.parentNode.insertBefore(s1, s0);
      }
    })();

    if(localStorage.getItem('hs_role') !== 'customer') window.location.href = 'login.html';
    const user = localStorage.getItem('hs_customer_name') || localStorage.getItem('hs_user') || 'Customer';
    document.getElementById('welcomeMsg').textContent = 'Welcome, ' + user;

    function openTawkChat(){
      if(window.Tawk_API && window.Tawk_API.maximize){
        window.Tawk_API.maximize();
      } else {
        alert('Live chat is not configured yet. Please paste your Tawk.to script in the placeholder above.');
      }
    }

    function submitSupport(){
      var type = document.getElementById('issueType').value;
      var msg = document.getElementById('issueMsg').value.trim();
      if(!type || !msg){ alert('Please select an issue type and enter your message.'); return; }
      var tickets = JSON.parse(localStorage.getItem('hs_support_tickets') || '[]');
      tickets.push({ id: Date.now(), user: user, type: type, msg: msg, submittedAt: new Date().toLocaleString(), status: 'open' });
      localStorage.setItem('hs_support_tickets', JSON.stringify(tickets));
      if(window.fbSave) fbSave('support_tickets', tickets[tickets.length-1]);
      document.getElementById('issueType').value = '';
      document.getElementById('issueMsg').value = '';
      var el = document.getElementById('supportMsg');
      el.style.display = 'block';
      setTimeout(function(){ el.style.display = 'none'; }, 4000);
    }

    function logout(){ localStorage.removeItem('hs_role'); window.location.href = 'login.html'; }
  </script>
</body>
</html>
